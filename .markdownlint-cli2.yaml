config:
  MD013: false
  MD025: false
  MD028: false
  MD036: false
  MD060: false
  MD033:
    allowed_elements:
      - div
      - br
      - p
  MD024: false
# Shared markdownlint-cli2 rules for docs and root markdown files.
ignores:
  # Local-only agent state and generated working directories.
  - ".agent/"
  - ".claude/"
  - ".git/"
  - ".history/"
  - ".mypy_cache/"
  - ".vscode/"
  - "archive/"
  - "artifacts/"
  - "node_modules/"
  - "dist/"
  - "coverage/"
  - "storybook-static/"

  # Root shim files and templates that intentionally diverge from doc lint norms.
  - "AGENTS.md"
  - "CLAUDE.md"
  - "GEMINI.md"
  - "docs/00.agent-governance/memory/template.md"
# Markdown auto-fix remains the canonical document formatter in pre-commit.
fix: true
