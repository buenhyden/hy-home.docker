name: "Pull Request Labeler"
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  triage:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Apply path labels
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
