name: CI Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Documentation Traceability ──────────────────────────────
  docs-traceability:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check docs traceability sync
        run: bash scripts/validation/check-doc-traceability.sh

  # ── Documentation Implementation Alignment ─────────────────
  docs-implementation-alignment:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      EVENT_NAME: ${{ github.event_name }}
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      PUSH_BEFORE_SHA: ${{ github.event.before }}
    steps:
      - *checkout
      - name: Check docs against tracked implementation surfaces
        run: bash scripts/validation/check-doc-implementation-alignment.sh
      - name: Publish QA gate recommendations
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          summary_file="${GITHUB_STEP_SUMMARY:-}"
          if [[ -z "$summary_file" ]]; then
            echo "GITHUB_STEP_SUMMARY is unavailable; skipping QA recommendation summary."
            exit 0
          fi

          base_ref=""
          if [[ "$EVENT_NAME" == "pull_request" && -n "${PR_BASE_SHA:-}" ]]; then
            base_ref="$PR_BASE_SHA"
          elif [[ "$EVENT_NAME" == "push" && -n "${PUSH_BEFORE_SHA:-}" && "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            base_ref="$PUSH_BEFORE_SHA"
          elif git rev-parse --verify --quiet HEAD~1 >/dev/null; then
            base_ref="HEAD~1"
          fi

          {
            echo "## QA gate recommendations"
            echo
            if [[ -n "$base_ref" ]] && git rev-parse --verify --quiet "${base_ref}^{commit}" >/dev/null; then
              echo '```text'
              bash scripts/validation/recommend-qa-gates.sh --base "$base_ref"
              echo '```'
            else
              echo "No comparable base ref is available for this run."
              echo
              echo '```text'
              bash scripts/validation/recommend-qa-gates.sh --files .github/workflows/ci-quality.yml
              echo '```'
            fi
          } >> "$summary_file"

  # ── Repository Contract Validation ──────────────────────
  repo-contracts:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - *checkout
      - name: Set up Python for repository contracts
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
      - name: Install repository contract Python dependencies
        run: python -m pip install -r scripts/requirements.txt
      - name: Check repository contracts
        run: bash scripts/validation/check-repo-contracts.sh

  # ── Agent Output Eval Fixture Gate ─────────────────────────
  agent-output-eval-fixture-gate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - *checkout
      - name: Check agent-output eval fixture catalog
        run: bash scripts/validation/run-agent-output-eval-fixtures.sh --check-fixtures

  # ── Dependency Vulnerability Audit ─────────────────────────
  dependency-vulnerability-audit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - *checkout
      - name: Set up Node.js for dependency audit
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/storybook/nextjs/package-lock.json
      - name: Audit Storybook Next.js dependencies
        run: npm audit --audit-level=high --prefix projects/storybook/nextjs

  # ── Git Flow Contract ───────────────────────────────────────
  git-flow-contract:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
      HEAD_REF: ${{ github.head_ref }}
    steps:
      - name: Check PR title and source branch
        shell: bash
        run: |
          set -euo pipefail

          title_re='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([A-Za-z0-9._-]+\))?!?: .+'
          human_branch_re='^((feat|fix|hotfix)/[A-Za-z0-9._-]+-.+|(docs|style|refactor|perf|test|build|ci|chore|revert)/.+)$'
          automation_branch_re='^(dependabot|codex)/.+'

          if ! [[ "$PR_TITLE" =~ $title_re ]]; then
            echo "PR title must follow Conventional Commits." >&2
            echo "Allowed examples: feat(scope): add thing, fix: repair thing" >&2
            exit 1
          fi

          if ! [[ "$HEAD_REF" =~ $human_branch_re || "$HEAD_REF" =~ $automation_branch_re ]]; then
            echo "Source branch must use a governed prefix." >&2
            echo "Human branches: feat/<issue-id>-..., fix/<issue-id>-..., hotfix/<issue-id>-..., docs/, style/," >&2
            echo "refactor/, perf/, test/, build/, ci/, chore/, or revert/." >&2
            echo "Automation branches: dependabot/** or codex/**." >&2
            exit 1
          fi

  # ── Compose Contract Validation ───────────────────────────────
  compose-validation:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - *checkout
      - &prepare-env
        name: Prepare environment
        run: cp .env.example .env
      - name: Validate Docker Compose config
        run: bash scripts/validation/validate-docker-compose.sh

  # ── Full Profile Compose Contract Validation ────────────────
  compose-all-profiles-validation:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HYHOME_COMPOSE_PROFILES: core data obs workflow ai tooling messaging security communication service storage admin iac registry sast sync testing graph mng ksql nginx
    steps:
      - *checkout
      - *prepare-env
      - name: Validate all Docker Compose profiles
        run: bash scripts/validation/validate-docker-compose.sh

  # ── Infrastructure Hardening Baseline ──────────────────────────
  infrastructure-hardening:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - *checkout
      - *prepare-env
      - name: Check all tiers hardening baseline
        run: bash scripts/hardening/check-all-hardening.sh

  # ── Template/Security Baseline ──────────────────────────────
  template-security-baseline:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - *checkout
      - *prepare-env
      - name: Check template adoption + security baseline
        run: bash scripts/validation/check-template-security-baseline.sh

  # ── QuickWin Baseline ───────────────────────────────────────
  quickwin-baseline:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - *checkout
      - *prepare-env
      - name: Check QuickWin baseline
        run: bash scripts/validation/check-quickwin-baseline.sh

  # ── Pre-commit Hooks ──────────────────────────────────────────
  pre-commit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - *checkout
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/storybook/nextjs/package-lock.json
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'
      - name: Install Storybook Next.js lint dependencies
        run: npm ci --prefix projects/storybook/nextjs
      - name: Run pre-commit hooks
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd
        env:
          SKIP: eslint-nextjs

  # ── Frontend Build and Typecheck ───────────────────────────
  frontend-quality:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - *checkout
      - name: Set up Node.js for frontend quality
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/storybook/nextjs/package-lock.json
      - name: Install Storybook Next.js dependencies
        run: npm ci --prefix projects/storybook/nextjs
      - name: Run Storybook Next.js lint
        run: npm run lint --prefix projects/storybook/nextjs
      - name: Run Storybook Next.js typecheck
        run: npm run typecheck --prefix projects/storybook/nextjs
      - name: Build Storybook Next.js app
        run: npm run build --prefix projects/storybook/nextjs
      - name: Build Storybook static site
        run: npm run build-storybook --prefix projects/storybook/nextjs

  # ── Storybook Coverage ───────────────────────────────────────
  storybook-coverage:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - *checkout
      - name: Set up Node.js for Storybook coverage
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/storybook/nextjs/package-lock.json
      - name: Install Storybook Next.js test dependencies
        run: npm ci --prefix projects/storybook/nextjs
      - name: Install Playwright browsers
        run: npx --prefix projects/storybook/nextjs playwright install chromium --with-deps
      - name: Run Storybook coverage
        run: npm run coverage --prefix projects/storybook/nextjs

  # ── GitHub Actions Security Analysis ─────────────────────────
  zizmor:
    permissions:
      security-events: write
      actions: read
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - *checkout

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39

      - name: Run zizmor
        run: uvx zizmor . --format sarif . > results.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: zizmor
