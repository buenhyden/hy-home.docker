name: CI Quality Gates

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Documentation Traceability ──────────────────────────────
  docs-traceability:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check docs traceability sync
        run: bash scripts/check-doc-traceability.sh

  # ── Gateway Hardening Baseline ──────────────────────────────
  gateway-hardening:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check 01-gateway hardening baseline
        run: bash scripts/check-gateway-hardening.sh

  # ── Auth Hardening Baseline ─────────────────────────────────
  auth-hardening:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check 02-auth hardening baseline
        run: bash scripts/check-auth-hardening.sh

  # ── Security Hardening Baseline ─────────────────────────────
  security-hardening:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check 03-security hardening baseline
        run: bash scripts/check-security-hardening.sh

  # ── Template/Security Baseline ──────────────────────────────
  template-security-baseline:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check template adoption + security baseline
        run: bash scripts/check-template-security-baseline.sh

  # ── QuickWin Baseline ───────────────────────────────────────
  quickwin-baseline:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check QuickWin baseline
        run: bash scripts/check-quickwin-baseline.sh

  # ── Pre-commit Hooks ──────────────────────────────────────────
  pre-commit:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  # ── GitHub Actions Security Analysis ─────────────────────────
  zizmor:
    permissions:
      security-events: write
      actions: read
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run zizmor
        run: uvx zizmor . --format sarif . > results.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: zizmor
