name: Document Corpus Lifecycle

on:
  schedule:
    - cron: '17 17 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: document-corpus-lifecycle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  document-corpus-lifecycle:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.12'
      - name: Install repository contract Python dependencies
        run: python -m pip install -r scripts/requirements.txt
      - name: Check lifecycle contract
        run: python3 scripts/validation/check-document-corpus-lifecycle.py --mode check-contract
      - name: Check promoted lifecycle waves
        run: python3 scripts/validation/check-document-corpus-lifecycle.py --mode check-promoted
      - name: Check impacted lifecycle records
        shell: bash
        run: |
          set -euo pipefail
          if git cat-file -e 'HEAD~1^{commit}' 2>/dev/null; then
            python3 scripts/validation/check-document-corpus-lifecycle.py --mode check-impacted --base-ref HEAD~1
          else
            echo "SKIP: HEAD~1 is unavailable; no comparison base exists"
          fi
      - name: Report full corpus lifecycle debt
        run: python3 scripts/validation/check-document-corpus-lifecycle.py --mode report-full
      - name: Report duplicate candidates
        shell: bash
        run: |
          set -euo pipefail
          report_path="${RUNNER_TEMP}/document-corpus-lifecycle-duplicates.md"
          python3 scripts/validation/check-document-corpus-lifecycle.py --mode report-duplicates --output "$report_path"
          cat -- "$report_path"
