name: Release Changelog Check

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changelog:
    name: Verify changelog contains release tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify CHANGELOG entry
        run: |
          set -euo pipefail
          RELEASE_TAG="${GITHUB_REF_NAME:?missing release tag}"

          if [[ ! -f CHANGELOG.md ]]; then
            echo "CHANGELOG.md does not exist." >&2
            echo "Create CHANGELOG.md and add an entry for $RELEASE_TAG before pushing the tag." >&2
            exit 1
          fi

          if ! grep -F -- "$RELEASE_TAG" CHANGELOG.md >/dev/null; then
            echo "CHANGELOG.md does not contain release tag: $RELEASE_TAG" >&2
            echo "Update CHANGELOG.md through the release branch PR before pushing the tag." >&2
            exit 1
          fi
