# ============================================================================
# Dependabot Configuration for Hy-Home Infrastructure
# 의존성을 자동으로 최신 상태로 유지하며, 인프라 최적화 환경에 맞춰 관리합니다.
# ============================================================================

version: 2
updates:
  # 1. GitHub Actions
  # 워크플로우 내의 Action 버전들을 주간 단위로 확인합니다.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"

  # 2. Docker
  # 루트 및 infra 하위의 Dockerfile / Compose 이미지 의존성을 감시합니다.
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/infra/01-gateway/nginx"
      - "/infra/01-gateway/traefik"
      - "/infra/02-auth/keycloak"
      - "/infra/02-auth/oauth2-proxy"
      - "/infra/03-security/vault"
      - "/infra/04-data/analytics/influxdb"
      - "/infra/04-data/analytics/ksql"
      - "/infra/04-data/analytics/opensearch"
      - "/infra/04-data/analytics/warehouses"
      - "/infra/04-data/cache-and-kv/valkey-cluster"
      - "/infra/04-data/lake-and-object/minio"
      - "/infra/04-data/lake-and-object/seaweedfs"
      - "/infra/04-data/nosql/cassandra"
      - "/infra/04-data/nosql/couchdb"
      - "/infra/04-data/nosql/mongodb"
      - "/infra/04-data/operational/mng-db"
      - "/infra/04-data/operational/supabase"
      - "/infra/04-data/relational/postgresql-cluster"
      - "/infra/04-data/specialized/neo4j"
      - "/infra/04-data/specialized/qdrant"
      - "/infra/05-messaging/kafka"
      - "/infra/05-messaging/rabbitmq"
      - "/infra/06-observability"
      - "/infra/06-observability/loki"
      - "/infra/06-observability/tempo"
      - "/infra/07-workflow/airflow"
      - "/infra/07-workflow/n8n"
      - "/infra/08-ai/ollama"
      - "/infra/08-ai/open-webui"
      - "/infra/09-tooling/k6"
      - "/infra/09-tooling/locust"
      - "/infra/09-tooling/registry"
      - "/infra/09-tooling/sonarqube"
      - "/infra/09-tooling/syncthing"
      - "/infra/09-tooling/terraform"
      - "/infra/09-tooling/terrakube"
      - "/infra/10-communication/mail"
      - "/infra/11-laboratory/dashboard"
      - "/infra/11-laboratory/dozzle"
      - "/infra/11-laboratory/open-notebook"
      - "/infra/11-laboratory/open-notebook/surrealdb"
      - "/infra/11-laboratory/portainer"
      - "/infra/11-laboratory/redisinsight"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker-images:
        patterns:
          - "*"

  # 3. Storybook Next.js
  # CI에서 설치되는 Storybook Next.js npm 의존성을 감시합니다.
  - package-ecosystem: "npm"
    directory: "/projects/storybook/nextjs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "npm"
      - "storybook"
    groups:
      storybook-nextjs:
        patterns:
          - "*"
