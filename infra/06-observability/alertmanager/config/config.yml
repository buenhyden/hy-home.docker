global:
  resolve_timeout: 5m
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "alertmanager@example.com"
  smtp_auth_username: "__SMTP_USERNAME__"
  smtp_auth_password: "__SMTP_PASSWORD__"

route:
  group_by: ["alertname", "job", "domain", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h # Increased from 1h to 4h to reduce noise for stable alerts
  receiver: "team-notifications-slack"
  routes:
    # Critical alerts go to both Slack and Email for maximum visibility
    - matchers:
        - severity="critical"
      receiver: "critical-notifications"
      repeat_interval: 1h

inhibit_rules:
  # Suppress Warning alerts if a Critical alert of the same type is already firing on the same instance
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: ["alertname", "instance", "job"]

  # Suppress service-level alerts if the underlying Node/Infrastructure is down
  - source_matchers: [alertname="InstanceDown"]
    target_matchers: [domain=~"apps|datastores|messaging"]
    equal: ["instance"]

receivers:
  - name: "team-notifications-slack"
    slack_configs:
      - api_url: "__SLACK_WEBHOOK_URL__"
        channel: "#notification"
        send_resolved: true
        icon_url: https://avatars3.githubusercontent.com/u/3380462
        color: '{{ if eq .Status "resolved" }}good{{ else if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}'
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
           *Severity:* `{{ .Labels.severity }}`
           *Domain:* `{{ .Labels.domain }}`
           *Summary:* {{ .Annotations.summary }}
           *Description:* {{ .Annotations.description }}
           ---
           *Started:* {{ .StartsAt.Local.Format "2006-01-02 15:04:05" }}
           *Links:* <{{ .GeneratorURL }}|Graph> | <{{ .Annotations.runbook_url }}|Runbook>
          {{ end }}

  - name: "critical-notifications"
    slack_configs:
      - api_url: "__SLACK_WEBHOOK_URL__"
        channel: "#critical-alerts"
        send_resolved: true
        color: "danger"
        title: '🔥 [CRITICAL] {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
           *Severity:* `CRITICAL`
           *Summary:* {{ .Annotations.summary }}
           *Description:* {{ .Annotations.description }}
           *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
