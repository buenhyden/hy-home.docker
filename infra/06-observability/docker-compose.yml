x-tier-label: &tier-label
  hy-home.tier: observability
# Refactored to use extends pattern for configuration inheritance

volumes:
  tempo-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_OBSERVABILITY_DIR}/tempo
  loki-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_OBSERVABILITY_DIR}/loki
  alertmanager-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_OBSERVABILITY_DIR}/alertmanager
  prometheus-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_OBSERVABILITY_DIR}/prometheus
  grafana-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_OBSERVABILITY_DIR}/grafana
  pyroscope-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_OBSERVABILITY_DIR}/pyroscope
  alloy-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_OBSERVABILITY_DIR}/alloy

services:
  prometheus:
    profiles:
      - obs
    extends:
      file: ../common-optimizations.yml
      service: template-stateful-high
    image: prom/prometheus:v3.9.0
    container_name: infra-prometheus
    tmpfs:
      - /tmp
      - /etc/prometheus:size=10M
    entrypoint:
      - '/bin/sh'
      - '-c'
    command: >
      "OPENSEARCH_PASSWORD=$$(cat /run/secrets/opensearch_exporter_password) && sed \"s|__OPENSEARCH_PASSWORD__|$$OPENSEARCH_PASSWORD|g\" /etc/prometheus/prometheus.yml.template > /tmp/prometheus.yml && exec /bin/prometheus --config.file=/tmp/prometheus.yml --storage.tsdb.path=/prometheus --web.console.libraries=/usr/share/prometheus/console_libraries --web.console.templates=/usr/share/prometheus/consoles --web.enable-lifecycle --web.enable-remote-write-receiver"
    volumes:
      - ./prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - ./prometheus/config/alert_rules:/etc/prometheus/alert_rules:ro
      - prometheus-data:/prometheus:rw
    secrets:
      - opensearch_exporter_password
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '-q',
          '--tries=1',
          '--spider',
          'http://localhost:${PROMETHEUS_PORT:-9090}/-/healthy',
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 1m
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.prometheus.rule: Host(`prometheus.${DEFAULT_URL}`)
      traefik.http.routers.prometheus.entrypoints: websecure
      traefik.http.routers.prometheus.tls: 'true'
      traefik.http.routers.prometheus.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
      traefik.http.services.prometheus.loadbalancer.server.port: ${PROMETHEUS_PORT:-9090}
    networks:
      infra_net:
        ipv4_address: 172.19.0.20

  loki:
    profiles:
      - obs
    extends:
      file: ../common-optimizations.yml
      service: template-stateful-high
    image: hy/loki:3.6.6-custom
    build:
      context: ./loki
      dockerfile: Dockerfile
    container_name: infra-loki
    user: '10001:10001'
    volumes:
      - ./loki/config/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki:rw
      # - ./loki/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    ports:
      - '${LOKI_HOST_PORT:-3100}:${LOKI_PORT:-3100}'
    environment:
      MINIO_APP_USERNAME: ${MINIO_APP_USERNAME}
    secrets:
      - minio_app_user_password
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:${LOKI_PORT:-3100}/ready >/dev/null 2>&1 || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 2m
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.loki.rule: Host(`loki.${DEFAULT_URL}`)
      traefik.http.routers.loki.entrypoints: websecure
      traefik.http.routers.loki.tls: 'true'
      traefik.http.routers.loki.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
      traefik.http.services.loki.loadbalancer.server.port: ${LOKI_PORT:-3100}
    networks:
      infra_net:
        ipv4_address: 172.19.0.21

  tempo:
    profiles:
      - obs
    extends:
      file: ../common-optimizations.yml
      service: template-stateful-high
    build:
      context: ./tempo
      dockerfile: Dockerfile
    image: hy/tempo:2.10.1-custom
    container_name: infra-tempo
    user: '10001:10001'
    volumes:
      - ./tempo/config/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo:rw
      # - ./tempo/docker-entrypoint.sh:/docker-entrypoint.sh:ro
    ports:
      - '${TEMPO_HOST_PORT:-3200}:${TEMPO_PORT:-3200}'
    environment:
      MINIO_APP_USERNAME: ${MINIO_APP_USERNAME}
    secrets:
      - minio_app_user_password
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:${TEMPO_PORT:-3200}/ready || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 2m
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.tempo.rule: Host(`tempo.${DEFAULT_URL}`)
      traefik.http.routers.tempo.entrypoints: websecure
      traefik.http.routers.tempo.tls: 'true'
      traefik.http.routers.tempo.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
      traefik.http.services.tempo.loadbalancer.server.port: ${TEMPO_PORT:-3200}
    networks:
      infra_net:
        ipv4_address: 172.19.0.22

  alloy:
    profiles:
      - obs
    extends:
      file: ../common-optimizations.yml
      service: template-infra-med
    image: grafana/alloy:v1.13.1
    container_name: infra-alloy
    tmpfs:
      - /tmp
      - /run
    command:
      - 'run'
      - '--server.http.listen-addr=0.0.0.0:${ALLOY_PORT:-12345}'
      - '/etc/alloy/config.alloy'
    volumes:
      - ./alloy/config/config.alloy:/etc/alloy/config.alloy:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy:rw
    ports:
      - '${ALLOY_OTLP_GRPC_HOST_PORT:-4317}:${ALLOY_OTLP_GRPC_PORT:-4317}'
      - '${ALLOY_OTLP_HTTP_HOST_PORT:-4318}:${ALLOY_OTLP_HTTP_PORT:-4318}'
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "bash -c 'exec 3<>/dev/tcp/localhost/12345; printf \"HEAD /-/healthy HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3; timeout 2 head -1 <&3 | grep -q \"200\"'",
        ]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 15s
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.alloy.rule: Host(`alloy.${DEFAULT_URL}`)
      traefik.http.routers.alloy.entrypoints: websecure
      traefik.http.routers.alloy.tls: 'true'
      traefik.http.routers.alloy.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
      traefik.http.services.alloy.loadbalancer.server.port: ${ALLOY_PORT:-12345}
    networks:
      infra_net:
        ipv4_address: 172.19.0.23

  grafana:
    profiles:
      - obs
    extends:
      file: ../common-optimizations.yml
      service: template-stateful-med
    image: grafana/grafana:12.3.3
    container_name: infra-grafana
    environment:
      GF_SERVER_ROOT_URL: https://grafana.${DEFAULT_URL}
      GF_SERVER_DOMAIN: grafana.${DEFAULT_URL}
      GF_AUTH_OAUTH_AUTO_LOGIN: 'true'
      GF_AUTH_DISABLE_LOGIN_FORM: 'true'
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USERNAME}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: 'Editor'
      GF_AUTH_GENERIC_OAUTH_ENABLED: 'true'
      GF_AUTH_GENERIC_OAUTH_NAME: 'Keycloak'
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: 'true'
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: 'preferred_username'
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: 'email'
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: 'name'
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET__FILE: /run/secrets/oauth2_proxy_client_secret
      GF_AUTH_GENERIC_OAUTH_SCOPES: 'openid profile email offline_access groups'
      GF_AUTH_GENERIC_OAUTH_TLS_SKIP_VERIFY_INSECURE: 'true'
      GF_DATAPROXY_TIMEOUT: 300
      GF_DATAPROXY_KEEP_ALIVE_SECONDS: 300
      # 전체 서버 읽기 타임아웃
      GF_SERVER_READ_TIMEOUT: 5m
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: 'https://keycloak.${DEFAULT_URL}/realms/hy-home.realm/protocol/openid-connect/auth'
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: 'https://keycloak.${DEFAULT_URL}/realms/hy-home.realm/protocol/openid-connect/token'
      GF_AUTH_GENERIC_OAUTH_API_URL: 'https://keycloak.${DEFAULT_URL}/realms/hy-home.realm/protocol/openid-connect/userinfo'
      GF_AUTH_SIGNOUT_REDIRECT_URL: 'https://keycloak.${DEFAULT_URL}/realms/hy-home.realm/protocol/openid-connect/logout?post_logout_redirect_uri=https://grafana.${DEFAULT_URL}/login'

      # 권한 매핑 (Role Mapping) - 핵심
      # Keycloak의 'groups' 정보를 읽어서 Grafana 권한(Admin/Editor/Viewer)으로 변환
      # 로직: groups 배열에 '/admins'이 있으면 'Admin', 아니면 'Viewer' 부여
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: contains(groups[*], '/admins') && 'Admin' || contains(groups[*], '/editors') && 'Editor' || 'Viewer'
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: 'true'
      # (옵션) '/admin' 그룹 유저에게 Grafana 전체 서버 관리자(Super Admin) 권한까지 부여하려면 true
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: 'true'
      GF_AUTH_GENERIC_OAUTH_GRAFANA_ADMIN_ATTRIBUTE_PATH: contains(groups[*], '/admins')
      # [5] 기타 기능 설정
      GF_FEATURE_TOGGLES_ENABLE: 'traceqlEditor'
      # [추가] PKCE 활성화: Keycloak의 보안 요구 사항을 충족시킵니다.
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: 'true'
      # S256 방식을 명시적으로 지정 (필요 시)
      GF_AUTH_GENERIC_OAUTH_CODE_CHALLENGE_METHOD: 'S256'
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana:rw
    secrets:
      - grafana_admin_password
      - oauth2_proxy_client_secret
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q --spider http://localhost:${GRAFANA_PORT:-3000}/api/health || exit 1',
        ]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 15s
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.grafana.rule: Host(`grafana.${DEFAULT_URL}`)
      traefik.http.routers.grafana.entrypoints: websecure
      traefik.http.routers.grafana.tls: 'true'
      traefik.http.services.grafana.loadbalancer.server.port: ${GRAFANA_PORT:-3000}
      traefik.http.routers.grafana.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
    networks:
      infra_net:
        ipv4_address: 172.19.0.24

  cadvisor:
    profiles:
      - obs
    extends:
      file: ../common-optimizations.yml
      service: template-host-observer-med
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    command:
      - '--docker_only=true'
      - '--housekeeping_interval=30s'
      - '--max_housekeeping_interval=35s'
      - '--event_storage_event_limit=default=0'
      - '--event_storage_age_limit=default=0'
    expose:
      - '${CADVISOR_PORT:-8080}'
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -q --spider http://localhost:${CADVISOR_PORT:-8080}/healthz || exit 1']
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 45s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/lib/dbus/machine-id:/var/lib/dbus/machine-id:ro
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.pyroscope.rule: Host(`pyroscope.${DEFAULT_URL}`)
      traefik.http.routers.pyroscope.entrypoints: websecure
      traefik.http.routers.pyroscope.tls: 'true'
      traefik.http.routers.pyroscope.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
      traefik.http.services.pyroscope.loadbalancer.server.port: ${PYROSCOPE_PORT:-4040}
    networks:
      infra_net:
        ipv4_address: 172.19.0.25

  pyroscope:
    profiles:
      - obs
    extends:
      file: ../common-optimizations.yml
      service: template-infra-med
    image: grafana/pyroscope:1.18.1
    container_name: infra-pyroscope
    command:
      - -config.file=/etc/pyroscope/pyroscope.yaml
      - -config.expand-env=true
    volumes:
      - ./pyroscope/config/pyroscope.yaml:/etc/pyroscope/pyroscope.yaml:ro
      - pyroscope-data:/var/lib/pyroscope:rw
    ports:
      - '${PYROSCOPE_HOST_PORT:-4040}:${PYROSCOPE_PORT:-4040}'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:4040/ready || exit 1']
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s
    labels:
      <<: *tier-label
    networks:
      infra_net:
        ipv4_address: 172.19.0.26

  alertmanager:
    profiles:
      - obs
    extends:
      file: ../common-optimizations.yml
      service: template-stateful-low
    image: prom/alertmanager:v0.30.0
    container_name: infra-alertmanager
    tmpfs:
      - /tmp
      - /etc/alertmanager:size=1M
    entrypoint: ['/bin/sh', '-c']
    command: >
      "SMTP_USERNAME=$$(cat /run/secrets/smtp_username) && SMTP_PASSWORD=$$(cat /run/secrets/smtp_password) && SLACK_WEBHOOK_URL=$$(cat /run/secrets/slack_webhook) && sed -e \"s|__SMTP_USERNAME__|$$SMTP_USERNAME|g\" -e \"s|__SMTP_PASSWORD__|$$SMTP_PASSWORD|g\" -e \"s|__SLACK_WEBHOOK_URL__|$$SLACK_WEBHOOK_URL|g\" /etc/alertmanager/config.yml.template > /tmp/config.yml && exec /bin/alertmanager --config.file=/tmp/config.yml --storage.path=/alertmanager"
    volumes:
      - ./alertmanager/config/config.yml:/etc/alertmanager/config.yml.template:ro
      - alertmanager-data:/alertmanager:rw
    secrets:
      - smtp_username
      - smtp_password
      - slack_webhook
    depends_on:
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q --spider http://localhost:${ALERTMANAGER_PORT:-9093}/-/ready || exit 1',
        ]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 15s
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.alertmanager.rule: Host(`alertmanager.${DEFAULT_URL}`)
      traefik.http.routers.alertmanager.entrypoints: websecure
      traefik.http.routers.alertmanager.tls: 'true'
      traefik.http.routers.alertmanager.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
      traefik.http.services.alertmanager.loadbalancer.server.port: ${ALERTMANAGER_PORT:-9093}
    networks:
      infra_net:
        ipv4_address: 172.19.0.27

  pushgateway:
    profiles:
      - obs
    extends:
      file: ../common-optimizations.yml
      service: template-infra-readonly-low
    image: prom/pushgateway:v1.11.2
    container_name: pushgateway
    expose:
      - '${PUSHGATEWAY_PORT:-9091}'
    depends_on:
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q --spider http://localhost:${PUSHGATEWAY_PORT:-9091}/-/ready || exit 1',
        ]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 15s
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.pushgateway.rule: Host(`pushgateway.${DEFAULT_URL}`)
      traefik.http.routers.pushgateway.entrypoints: websecure
      traefik.http.routers.pushgateway.tls: 'true'
      traefik.http.routers.pushgateway.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
      traefik.http.services.pushgateway.loadbalancer.server.port: ${PUSHGATEWAY_PORT:-9091}
    networks:
      infra_net:
        ipv4_address: 172.19.0.28
