x-tier-label: &tier-label
  hy-home.tier: admin

# volumes:
#   homer-data:
#     driver: local
#     driver_opts:
#       o: bind
#       type: none
#       device: ${DEFAULT_MANAGEMENT_DIR}/homer

services:
  homer:
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-low
    image: b4bz/homer
    container_name: homer
    volumes:
      - ./config:/www/assets # Make sure your local config directory exists
    ports:
      - ${HOMER_HOST_PORT:-8080}:${HOMER_PORT:-8080}
    user: 1000:1000 # default
    environment:
      - INIT_ASSETS=1 # default, requires the config directory to be writable for the container user (see user option)
    networks:
      - infra_net
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.homer.rule: Host(`homer.${DEFAULT_URL}`)
      traefik.http.routers.homer.entrypoints: websecure
      traefik.http.routers.homer.tls: 'true'
      traefik.http.routers.homer.middlewares: sso-errors@file,sso-auth@file
      traefik.http.services.homer.loadbalancer.server.port: ${HOMER_PORT:-8080}
