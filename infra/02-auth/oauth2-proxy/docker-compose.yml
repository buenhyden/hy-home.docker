x-tier-label: &tier-label
  hy-home.tier: auth

volumes:
  oauth2-proxy-valkey-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_AUTH_DIR}/valkey

services:
  oauth2-proxy:
    profiles:
      - core
      - auth
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-readonly-med
    # image: quay.io/oauth2-proxy/oauth2-proxy:v7.14.2
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oauth2-proxy
    environment:
      - SSL_CERT_FILE=/etc/ssl/certs/rootCA.pem
      - OAUTH2_PROXY_SESSION_STORE_TYPE=redis
      - OAUTH2_PROXY_REDIS_CONNECTION_URL=redis://oauth2-proxy-valkey:6379
      - OAUTH2_PROXY_CLIENT_ID=${OAUTH2_PROXY_CLIENT_ID}
      - OAUTH2_PROXY_OIDC_ISSUER_URL=https://keycloak.${DEFAULT_URL}/realms/hy-home.realm
      - OAUTH2_PROXY_REDIRECT_URL=https://auth.${DEFAULT_URL}/oauth2/callback
      - OAUTH2_PROXY_COOKIE_DOMAINS=.${DEFAULT_URL}
      - OAUTH2_PROXY_WHITELIST_DOMAINS=*.${DEFAULT_URL}
    volumes:
      - ./config/oauth2-proxy.cfg:/etc/oauth2-proxy.cfg:ro
      - ../../../secrets/certs/rootCA.pem:/etc/ssl/certs/rootCA.pem:ro
    secrets:
      - oauth2_valkey_password
      - oauth2_proxy_client_secret
      - oauth2_proxy_cookie_secret
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.oauth2-proxy.rule: Host(`auth.${DEFAULT_URL}`) && PathPrefix(`/oauth2`)
      traefik.docker.network: infra_net
      traefik.http.routers.oauth2-proxy.entrypoints: websecure
      traefik.http.routers.oauth2-proxy.service: oauth2-proxy-svc
      traefik.http.routers.oauth2-proxy.tls: 'true'
      traefik.http.routers.oauth2-proxy.middlewares: gateway-standard-chain@file
      traefik.http.services.oauth2-proxy-svc.loadbalancer.server.port: ${OAUTH2_PROXY_PORT:-4180}
    networks:
      infra_net:
        ipv4_address: 172.19.0.4
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://127.0.0.1:${OAUTH2_PROXY_PORT:-4180}/ping >/dev/null 2>&1 || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    extra_hosts:
      - 'keycloak.${DEFAULT_URL}:host-gateway'
      - 'auth.${DEFAULT_URL}:host-gateway'

  oauth2-proxy-valkey:
    profiles:
      - core
      - auth
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-low
    image: valkey/valkey:9.0.2-alpine
    container_name: oauth2-proxy-valkey
    user: '999:999'
    secrets:
      - oauth2_valkey_password
    networks:
      infra_net:
        ipv4_address: 172.19.0.5
    restart: unless-stopped
    volumes:
      # 공통 valkey.conf
      - oauth2-proxy-valkey-data:/data
    command: >
      sh -c '
      valkey-server
      --requirepass "$(cat /run/secrets/oauth2_valkey_password)"
      --appendonly yes
      --port 6379
      '
    expose:
      - '${VALKEY_PORT:-6379}'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'V_PASS=$$(cat /run/secrets/oauth2_valkey_password); valkey-cli -a $$V_PASS -h 127.0.0.1 -p ${VALKEY_PORT:-6379} ping | grep PONG',
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    labels:
      <<: *tier-label
      traefik.enable: 'false'

  oauth2-proxy-valkey-exporter:
    profiles:
      - core
      - auth
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-readonly-low
    image: oliver006/redis_exporter:v1.80.1-alpine
    container_name: oauth2-proxy-redis-exporter
    expose:
      - '${VALKEY_EXPORTER_PORT:-9121}'
    networks:
      infra_net:
        ipv4_address: 172.19.0.6
    restart: unless-stopped
    secrets:
      - oauth2_valkey_password
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        echo "Reading password from secret..."
        export VALKEY_PASSWORD=$(cat /run/secrets/oauth2_valkey_password | tr -d '\n')

        echo "Starting Valkey Exporter..."
        # -redis.password-file 대신 -redis.password 사용
        exec /redis_exporter \
          -redis.addr=redis://oauth2-proxy-valkey:6379 \
          -redis.password="$$VALKEY_PASSWORD" \
          -web.listen-address=:${VALKEY_EXPORTER_PORT}
    depends_on: # healthcheck를 사용하므로 condition으로 변경 (더 안정적)
      oauth2-proxy-valkey:
        condition: service_healthy
    labels:
      <<: *tier-label
      traefik.enable: 'false'
