x-tier-label: &tier-label
  hy-home.tier: auth

volumes:
  keycloak-config:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_AUTH_DIR}/keycloak/conf
  keycloak-providers:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_AUTH_DIR}/keycloak/providers
  keycloak-themes:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_AUTH_DIR}/keycloak/themes

services:
  keycloak:
    profiles:
      - core
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-med
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: keycloak
    hostname: keycloak
    tmpfs:
      - /tmp
    volumes:
      - keycloak-themes:/opt/keycloak/themes:ro
      - keycloak-config:/opt/keycloak/conf:ro
      - keycloak-providers:/opt/keycloak/providers:ro
    entrypoint:
      - /bin/sh
      - -ec
      - |
        KC_BOOTSTRAP_ADMIN_PASSWORD="$$(tr -d '\r\n' </run/secrets/keycloak_admin_password)"
        KC_DB_PASSWORD="$$(tr -d '\r\n' </run/secrets/keycloak_db_password)"
        export KC_BOOTSTRAP_ADMIN_PASSWORD
        export KC_DB_PASSWORD
        exec /opt/keycloak/bin/kc.sh start
    environment:
      KC_DB: ${KEYCLOAK_DATABASE}
      KC_DB_URL: jdbc:postgresql://mng-pg:${POSTGRES_PORT:-5432}/${KEYCLOAK_DBNAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER}
      KC_HOSTNAME: keycloak.${DEFAULT_URL}
      KC_HTTP_ENABLED: 'true'
      KC_PROXY_HEADERS: xforwarded
      KC_METRICS_ENABLED: 'true'
      KC_HEALTH_ENABLED: 'true'
      KC_DB_POOL_INITIAL_SIZE: 1
      KC_DB_POOL_MIN_SIZE: 1
      KC_DB_POOL_MAX_SIZE: 10
      JAVA_OPTS_APPEND: >-
        -Dquarkus.datasource.jdbc.idle-removal-interval=5M
        -Dquarkus.datasource.jdbc.background-validation-interval=1M
    expose:
      - ${KEYCLOAK_MANAGEMENT_PORT:-9000}
      - ${KEYCLOAK_PORT:-8080}
    secrets:
      - keycloak_db_password
      - keycloak_admin_password
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.keycloak.rule: Host(`keycloak.${DEFAULT_URL}`)
      traefik.http.routers.keycloak.entrypoints: websecure
      traefik.http.routers.keycloak.tls: 'true'
      traefik.http.routers.keycloak.middlewares: gateway-standard-chain@file
      traefik.http.services.keycloak.loadbalancer.server.port: ${KEYCLOAK_PORT:-8080}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "exec 3<>/dev/tcp/127.0.0.1/${KEYCLOAK_MANAGEMENT_PORT:-9000}; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; cat <&3 | grep -Eq '\"status\"[[:space:]]*:[[:space:]]*\"UP\"' && exit 0 || exit 1",
        ]
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 60s
    networks:
      - infra_net
