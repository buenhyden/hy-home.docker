x-tier-label: &tier-label
  hy-home.tier: gateway

services:
  traefik:
    profiles:
      - core
      - dev
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-readonly-med
    image: traefik:v3.6.12
    container_name: traefik
    hostname: traefik
    ports:
      - ${HTTP_HOST_PORT:-80}:${HTTP_PORT:-80}
      - ${HTTPS_HOST_PORT:-443}:${HTTPS_PORT:-443}
      - ${NEO4J_BOLT_HOST_PORT:-7687}:${NEO4J_BOLT_PORT:-7687}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../../secrets/certs:/certs:ro
      - ./dynamic:/dynamic:ro
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
    command:
      - '--configFile=/etc/traefik/traefik.yml'
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.dashboard.rule: Host(`dashboard.${DEFAULT_URL}`)
      traefik.http.routers.dashboard.entrypoints: websecure
      traefik.http.routers.dashboard.tls: 'true'
      traefik.http.routers.dashboard.service: api@internal
      traefik.http.routers.dashboard.middlewares: dashboard-auth@file,gateway-standard-chain@file
    healthcheck:
      test: ['CMD', 'traefik', 'healthcheck', '--ping']
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 15s
    networks:
      k3d-hyhome:
        ipv4_address: 172.18.0.2
      openclaw_default:
        ipv4_address: 172.20.0.3
      infra_net:
        ipv4_address: 172.19.0.2
        aliases:
          - keycloak.${DEFAULT_URL}
          - auth.${DEFAULT_URL}
    secrets:
      - traefik_basicauth_password
      - traefik_opensearch_basicauth_password
