# Traefik dynamic configuration for Adminer via k3d ingress-nginx
# Pattern mirrors argocd-k3d.yaml.
#
# Traffic flow:
#   Browser → Traefik (websecure/443) → k3d-hyhome-serverlb:443
#     → ingress-nginx LoadBalancer → Adminer service (apps:8080)
#
# TLS: Traefik terminates with its own cert (nip.io wildcard or mkcert).
#      insecureSkipVerify=true skips validation of the ingress-nginx
#      backend cert (signed by local mkcert CA).

http:
  serversTransports:
    adminer-k3d-transport:
      insecureSkipVerify: true

  services:
    adminer-k3d:
      loadBalancer:
        passHostHeader: true
        serversTransport: adminer-k3d-transport
        servers:
          - url: 'https://k3d-hyhome-serverlb:443'

  routers:
    adminer-k3d:
      rule: 'Host(`adminer.127.0.0.1.nip.io`)'
      entryPoints:
        - websecure
      service: adminer-k3d
      tls: {}
