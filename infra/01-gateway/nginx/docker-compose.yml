services:
  nginx:
    profiles:
      - nginx
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-readonly-low
    image: nginx:alpine
    container_name: nginx
    ports:
      - ${HTTP_HOST_PORT:-80}:${HTTP_PORT:-80}
      - ${HTTPS_HOST_PORT:-443}:${HTTPS_PORT:-443}
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../../secrets/certs:/etc/nginx/certs:ro
    tmpfs:
      - /var/cache/nginx
      - /var/log/nginx
      - /var/run
    networks:
      - infra_net
    depends_on:
      minio: { condition: service_healthy }
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:${HTTP_PORT:-80}/ping || exit 1']
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 15s
