x-tier-label: &tier-label
  hy-home.tier: communication

volumes:
  stalwart-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DEFAULT_COMMUNICATION_DIR}/stalwart/data

secrets:
  stalwart_password:
    external: true

services:
  stalwart:
    profiles:
      - 'communication'
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-med
    image: stalwartlabs/stalwart:v0.14
    container_name: stalwart
    read_only: false
    ports:
      - '${SMTP_HOST_PORT:-25}:${SMTP_PORT:-25}'
      - '${SUBMISSION_HOST_PORT:-587}:${SUBMISSION_PORT:-587}'
      - '${SMTPS_HOST_PORT:-465}:${SMTPS_PORT:-465}'
      - '${IMAPS_HOST_PORT:-993}:${IMAPS_PORT:-993}'
      - '${MANAGESIEVE_HOST_PORT:-4190}:${MANAGESIEVE_PORT:-4190}'
    volumes:
      - stalwart-data:/opt/stalwart:rw
      - ../../../secrets/certs:/opt/stalwart/certs:ro
    networks:
      - infra_net
    secrets:
      - stalwart_password
    environment:
      - STALWART_ADMIN_USER=admin
    command: >
      sh -c "
      export STALWART_ADMIN_PASSWORD=$$(cat /run/secrets/stalwart_password) &&
      exec /usr/local/bin/stalwart-mail
      "
    healthcheck:
      test: ['CMD-SHELL', 'nc -z localhost ${SMTP_PORT:-25} || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.stalwart-ui.rule: Host(`mail.${DEFAULT_URL}`)
      traefik.http.routers.stalwart-ui.entrypoints: websecure
      traefik.http.routers.stalwart-ui.tls: 'true'
      traefik.http.routers.stalwart-ui.middlewares: gateway-standard-chain@file
      traefik.http.services.stalwart-ui.loadbalancer.server.port: ${STALWART_PORT:-8080}

  mailhog:
    profiles:
      - 'communication'
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-low
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - infra_net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8025/']
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.mailhog.rule: Host(`mailhog.${DEFAULT_URL}`)
      traefik.http.routers.mailhog.entrypoints: websecure
      traefik.http.routers.mailhog.tls: 'true'
      traefik.http.routers.mailhog.middlewares: gateway-standard-chain@file
      traefik.http.services.mailhog.loadbalancer.server.port: ${MAILHOG_UI_PORT:-8025}
      traefik.http.routers.mailhog.middlewares: sso-errors@file,sso-auth@file
