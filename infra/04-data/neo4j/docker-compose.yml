x-tier-label: &tier-label
  hy-home.tier: data

volumes:
  neo4j-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_DATA_DIR}/neo4j/data

services:
  neo4j:
    profiles:
      - data
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-med
    image: neo4j:5.26.23-community
    container_name: neo4j
    hostname: neo4j
    restart: unless-stopped
    read_only: false
    expose:
      - ${NEO4J_BOLT_PORT:-7687}
      - ${NEO4J_HTTP_PORT:-7474}
      - ${NEO4J_HTTPS_PORT:-7473}
    # ports:
    #   - '${NEO4J_BOLT_HOST_PORT:-7687}:${NEO4J_BOLT_PORT:-7687}'
    environment:
      # NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}

      # Neo4j 5 메모리 튜닝
      NEO4J_server_memory_heap_initial__size: '128M'
      NEO4J_server_memory_heap_max__size: '256M'
      NEO4J_server_memory_pagecache_size: '128M'

      # 필요 시 명시적으로 바인딩
      NEO4J_server_default__listen__address: '0.0.0.0'
      # Browser/driver가 외부에서 접근할 주소를 알도록 명시
      NEO4J_server_bolt_advertised__address: 'neo4j.${DEFAULT_URL}:7687'
      NEO4J_server_http_advertised__address: 'neo4j.${DEFAULT_URL}:443'

      # 선택: APOC 등 플러그인 없으면 비워둠
      # NEO4J_PLUGINS: '[]'

    entrypoint: ['/bin/sh', '/startup/neo4j-entrypoint-with-secrets.sh']
    volumes:
      - neo4j-data:/data:rw
      - ./scripts/neo4j-entrypoint-with-secrets.sh:/startup/neo4j-entrypoint-with-secrets.sh:ro
    secrets:
      - neo4j_password
    networks:
      - infra_net
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      # -----------------------------
      # HTTP Router: Neo4j Browser
      # https://neo4j.${DEFAULT_URL} -> neo4j:7474
      # -----------------------------
      traefik.http.routers.neo4j.rule: Host(`neo4j.${DEFAULT_URL}`)
      traefik.http.routers.neo4j.entrypoints: websecure
      traefik.http.routers.neo4j.tls: 'true'
      traefik.http.services.neo4j.loadbalancer.server.port: ${NEO4J_HTTP_PORT:-7474}
      # -----------------------------
      # TCP Router: Neo4j Bolt
      # neo4j.${DEFAULT_URL}:7687 -> neo4j:7687
      # -----------------------------
      traefik.tcp.routers.neo4j-bolt.entrypoints: neo4j-bolt
      traefik.tcp.routers.neo4j-bolt.tls: "true"
      traefik.tcp.routers.neo4j-bolt.rule: "HostSNI(`*`)"
      traefik.tcp.routers.neo4j-bolt.service: neo4j-bolt-svc
      traefik.tcp.services.neo4j-bolt-svc.loadbalancer.server.port: "${NEO4J_BOLT_PORT:-7687}"
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "cypher-shell -a bolt://localhost:7687 -u neo4j -p \"$(tr -d '\\n' < /run/secrets/neo4j_password)\" 'RETURN 1;' >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
