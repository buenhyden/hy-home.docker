x-tier-label: &tier-label
  hy-home.tier: data

x-valkey-node-base: &valkey-node-base
  extends:
    file: ../../common-optimizations.yml
    service: template-stateful-med
  image: valkey/valkey:9.0.2-alpine
  read_only: false
  tmpfs:
    - /tmp
    - /run
  secrets:
    - service_valkey_password
  entrypoint: ['/bin/sh', '/usr/local/bin/valkey-start.sh']
  healthcheck:
    test:
      [
        'CMD-SHELL',
        "V_PASS=$$(cat /run/secrets/service_valkey_password | tr -d '\n'); valkey-cli -a $$V_PASS -p $$PORT ping | grep PONG",
      ]
    interval: 15s
    timeout: 10s
    retries: 5
    start_period: 20s
  labels:
    <<: *tier-label
  networks:
    - infra_net

volumes:
  valkey0-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_DATA_DIR}/valkey/data-1
  valkey1-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_DATA_DIR}/valkey/data-1
  valkey2-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_DATA_DIR}/valkey/data-2
  valkey3-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_DATA_DIR}/valkey/data-3
  valkey4-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_DATA_DIR}/valkey/data-4
  valkey5-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_DATA_DIR}/valkey/data-5

services:
  valkey-node-0:
    <<: *valkey-node-base
    container_name: valkey-node-0
    environment:
      PORT: ${VALKEY0_PORT}
      NODE_NAME: valkey-node-0
    ports:
      - '${VALKEY0_PORT:-6379}:${VALKEY0_PORT:-6379}'
    expose:
      - ${VALKEY0_BUS_PORT:-16379}
    volumes:
      - valkey0-data:/data:rw
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
      - ./scripts/valkey-start.sh:/usr/local/bin/valkey-start.sh:ro

  valkey-node-1:
    <<: *valkey-node-base
    container_name: valkey-node-1
    environment:
      PORT: ${VALKEY1_PORT}
      NODE_NAME: valkey-node-1
    ports:
      - '${VALKEY1_PORT:-6380}:${VALKEY1_PORT:-6380}'
    expose:
      - ${VALKEY1_BUS_PORT:-16380}
    volumes:
      - valkey1-data:/data:rw
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
      - ./scripts/valkey-start.sh:/usr/local/bin/valkey-start.sh:ro

  valkey-node-2:
    <<: *valkey-node-base
    container_name: valkey-node-2
    environment:
      PORT: ${VALKEY2_PORT}
      NODE_NAME: valkey-node-2
    ports:
      - '${VALKEY2_PORT:-6381}:${VALKEY2_PORT:-6381}'
    expose:
      - ${VALKEY2_BUS_PORT:-16381}
    volumes:
      - valkey2-data:/data:rw
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
      - ./scripts/valkey-start.sh:/usr/local/bin/valkey-start.sh:ro

  valkey-node-3:
    <<: *valkey-node-base
    container_name: valkey-node-3
    environment:
      PORT: ${VALKEY3_PORT}
      NODE_NAME: valkey-node-3
    ports:
      - '${VALKEY3_PORT:-6382}:${VALKEY3_PORT:-6382}'
    expose:
      - ${VALKEY3_BUS_PORT:-16382}
    volumes:
      - valkey3-data:/data:rw
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
      - ./scripts/valkey-start.sh:/usr/local/bin/valkey-start.sh:ro

  valkey-node-4:
    <<: *valkey-node-base
    container_name: valkey-node-4
    environment:
      PORT: ${VALKEY4_PORT}
      NODE_NAME: valkey-node-4
    ports:
      - '${VALKEY4_PORT:-6383}:${VALKEY4_PORT:-6383}'
    expose:
      - ${VALKEY4_BUS_PORT:-16383}
    volumes:
      - valkey4-data:/data:rw
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
      - ./scripts/valkey-start.sh:/usr/local/bin/valkey-start.sh:ro

  valkey-node-5:
    <<: *valkey-node-base
    container_name: valkey-node-5
    environment:
      PORT: ${VALKEY5_PORT}
      NODE_NAME: valkey-node-5
    ports:
      - '${VALKEY5_PORT:-6384}:${VALKEY5_PORT:-6384}'
    expose:
      - ${VALKEY5_BUS_PORT:-16384}
    volumes:
      - valkey5-data:/data:rw
      - ./config/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
      - ./scripts/valkey-start.sh:/usr/local/bin/valkey-start.sh:ro

  valkey-cluster-init:
    extends:
      file: ../../common-optimizations.yml
      service: template-job-low
    image: valkey/valkey:9.0.2-alpine
    container_name: valkey-cluster-init
    entrypoint: ['/bin/sh', '/usr/local/bin/valkey-cluster-init.sh']
    volumes:
      - ./scripts/valkey-cluster-init.sh:/usr/local/bin/valkey-cluster-init.sh:ro
    secrets:
      - service_valkey_password
    depends_on:
      valkey-node-0:
        condition: service_healthy
      valkey-node-1:
        condition: service_healthy
      valkey-node-2:
        condition: service_healthy
      valkey-node-3:
        condition: service_healthy
      valkey-node-4:
        condition: service_healthy
      valkey-node-5:
        condition: service_healthy
    labels:
      <<: *tier-label
    networks:
      - infra_net
