x-tier-label: &tier-label
  hy-home.tier: data

volumes:
  mng-pg-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_MANAGEMENT_DIR}/pg
  mng-valkey-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_MANAGEMENT_DIR}/valkey
  redisinsight-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_MANAGEMENT_DIR}/redisinsight

services:
  mng-valkey:
    profiles: ['core']
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-low
    image: valkey/valkey:8.0.2-alpine
    container_name: mng-valkey
    user: '999:999'
    read_only: false
    labels:
      <<: *tier-label
      traefik.enable: 'false'
    secrets:
      - mng_valkey_password
    networks:
      - infra_net
    volumes:
      - mng-valkey-data:/data:rw
    command: >
      sh -c '
      valkey-server
      --requirepass "$$(cat /run/secrets/mng_valkey_password)"
      --appendonly yes
      --port 6379
      '
    expose:
      - '${VALKEY_PORT:-6379}'
      - '${VALKEY_BUS_PORT:-16379}'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'V_PASS=$$(cat /run/secrets/mng_valkey_password); valkey-cli -a $$V_PASS -h 127.0.0.1 -p 6379 ping | grep PONG',
        ]
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 15s

  mng-valkey-exporter:
    profiles: ['core']
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-low
    image: oliver006/redis_exporter:v1.81.0-alpine
    container_name: mng-valkey-exporter
    read_only: true
    tmpfs:
      - /tmp
    expose:
      - '${VALKEY_EXPORTER_PORT:-9121}'
    networks:
      - infra_net
    secrets:
      - mng_valkey_password
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        export VALKEY_PASSWORD=$$(cat /run/secrets/mng_valkey_password | tr -d '\n')
        exec /redis_exporter \
          -redis.addr=redis://mng-valkey:6379 \
          -redis.password="$$VALKEY_PASSWORD" \
          -web.listen-address=:${VALKEY_EXPORTER_PORT:-9121}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:${VALKEY_EXPORTER_PORT:-9121}/metrics > /dev/null 2>&1 || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      mng-valkey:
        condition: service_healthy

  redisinsight:
    profiles: ['core']
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-med
    image: redis/redisinsight:3.0.3
    container_name: redisinsight
    user: '1000:1000'
    read_only: false
    networks:
      - infra_net
    volumes:
      - redisinsight-data:/db:rw
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.redisinsight.rule: Host(`redisinsight.${DEFAULT_URL}`)
      traefik.http.routers.redisinsight.entrypoints: websecure
      traefik.http.routers.redisinsight.tls: 'true'
      traefik.http.routers.redisinsight.middlewares: sso-errors@file,sso-auth@file
      traefik.http.services.redisinsight.loadbalancer.server.port: ${REDIS_INSIGHT_PORT:-8001}

  mng-pg:
    profiles: ['core']
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-med
    image: postgres:17-alpine
    container_name: mng-pg
    networks:
      - infra_net
    shm_size: 256mb
    read_only: false
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/mng_postgres_password
      POSTGRES_USER: ${POSTGRES_DEFAULT_USER}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${POSTGRES_HOST_PORT:-25432}:${POSTGRES_PORT:-5432}'
    secrets:
      - mng_postgres_password
    volumes:
      - mng-pg-data:/var/lib/postgresql/data:rw
      - ./pg/init-scripts/init_users_dbs.sql:/docker-entrypoint-initdb.d/init_users_dbs.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 20s

  mng-pg-init:
    profiles: ['core']
    extends:
      file: ../../common-optimizations.yml
      service: template-job-low
    image: postgres:17-alpine
    container_name: mng-pg-init
    read_only: true
    tmpfs:
      - /tmp
    environment:
      PGPASSWORD_FILE: /run/secrets/mng_postgres_password
      POSTGRES_HOSTNAME: ${POSTGRES_MNG_HOSTNAME}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_DEFAULT_USER}
      POSTGRES_DB: ${POSTGRES_DEFAULT_DB}
    command: >
      sh -c "
      until pg_isready -h $$POSTGRES_HOSTNAME -p $$POSTGRES_PORT -U $$POSTGRES_USER -d $$POSTGRES_DB; do sleep 2; done;
      export PGPASSWORD=$$(cat /run/secrets/mng_postgres_password | tr -d '\n');
      export N8N_DB_PASSWORD=$$(cat /run/secrets/n8n_db_password | tr -d '\n');
      export KEYCLOAK_DB_PASSWORD=$$(cat /run/secrets/keycloak_db_password | tr -d '\n');
      export AIRFLOW_DB_PASSWORD=$$(cat /run/secrets/airflow_db_password | tr -d '\n');
      export TERRAKUBE_DB_PASSWORD=$$(cat /run/secrets/terrakube_db_password | tr -d '\n');
      export SONARQUBE_DB_PASSWORD=$$(cat /run/secrets/sonarqube_db_password | tr -d '\n');
      psql -h $$POSTGRES_HOSTNAME -p $$POSTGRES_PORT -U $$POSTGRES_USER -d $$POSTGRES_DB -f /work/init_users_dbs.sql;"
    volumes:
      - ./pg/init-scripts/init_users_dbs.sql:/work/init_users_dbs.sql:ro
    depends_on:
      mng-pg:
        condition: service_healthy
    secrets:
      - mng_postgres_password
      - n8n_db_password
      - keycloak_db_password
      - airflow_db_password
      - terrakube_db_password
      - sonarqube_db_password

  mng-pg-exporter:
    profiles: ['core']
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-low
    image: prometheuscommunity/postgres-exporter:v0.18.1
    container_name: mng-pg-exporter
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - infra_net
    expose:
      - '${POSTGRES_EXPORTER_PORT:-9187}'
    secrets:
      - mng_postgres_password
    depends_on:
      mng-pg:
        condition: service_healthy
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        export PGPASSWORD=$$(cat /run/secrets/mng_postgres_password | tr -d '\n')
        export DATA_SOURCE_NAME="postgresql://${POSTGRES_DEFAULT_USER}:$$PGPASSWORD@mng-pg:5432/${POSTGRES_DEFAULT_DB}?sslmode=disable"
        exec /bin/postgres_exporter
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:${POSTGRES_EXPORTER_PORT:-9187}/metrics > /dev/null 2>&1 || exit 1',
        ]
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 15s
