        export DATA_SOURCE_NAME="postgresql://$${PATRONI_EXPORTER_USERNAME:-exporter}:$$PGPASSWORD@pg-1:$${POSTGRES_PORT:-5432}/postgres?sslmode=require"
        exec /bin/postgres_exporter
