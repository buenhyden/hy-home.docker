    depends_on:
      etcd-1:
        condition: service_healthy
      etcd-2:
        condition: service_healthy
      etcd-3:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U $${PATRONI_SUPERUSER_USERNAME:-postgres} -h 127.0.0.1 -p $${POSTGRES_PORT:-5432}'
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    labels:
      <<: *tier-label
    networks:
      infra_net:
        ipv4_address: 172.19.0.56

  pg-0-exporter:
    profiles:
      - data
      - service
    extends:
      file: ../../../common-optimizations.yml
      service: template-infra-low
    image: prometheuscommunity/postgres-exporter:v0.18.1
    container_name: pg-0-exporter
    read_only: true
    tmpfs:
      - /tmp
    expose:
      - '${POSTGRES_EXPORTER_PORT:-9187}'
    secrets:
      - patroni_exporter_password
    environment:
      PATRONI_EXPORTER_USERNAME: ${PATRONI_EXPORTER_USERNAME:-exporter}
    entrypoint: [/bin/sh, -c]
    command:
      - |
        export PGPASSWORD=$$(cat /run/secrets/patroni_exporter_password | tr -d '\n')
        export DATA_SOURCE_NAME="postgresql://$${PATRONI_EXPORTER_USERNAME:-exporter}:$$PGPASSWORD@pg-0:$${POSTGRES_PORT:-5432}/postgres?sslmode=require"
        exec /bin/postgres_exporter
    depends_on:
      pg-0:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:${POSTGRES_EXPORTER_PORT:-9187}/metrics > /dev/null 2>&1 || exit 1',
        ]
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 15s
    labels:
      <<: *tier-label
    networks:
      infra_net:
        ipv4_address: 172.19.0.57

  pg-1-exporter:
    profiles:
      - data
      - service
    extends:
      file: ../../../common-optimizations.yml
      service: template-infra-low
    image: prometheuscommunity/postgres-exporter:v0.18.1
