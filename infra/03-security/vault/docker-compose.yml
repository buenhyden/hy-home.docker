x-tier-label: &tier-label
  hy-home.tier: security

volumes:
  vault-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_SECURITY_DIR}/vault/data
  vault-agent-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_SECURITY_DIR}/vault/agent
  vault-agent-out:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_SECURITY_DIR}/vault/out

services:
  vault:
    profiles:
      - core
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-med
    image: hashicorp/vault:1.21.4
    container_name: vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
      - SETGID # su-exec: setgroups 에러 해결용
      - SETUID # 사용자 ID 전환 권한
    ports:
      - '${VAULT_HOST_PORT:-8200}:${VAULT_PORT:-8200}'
    expose:
      - ${VAULT_PORT:-8200}
      - '${VAULT_CLUSTER_PORT:-8201}'
    environment:
      # 컨테이너 내부에서 vault CLI가 자기 자신에게 붙을 때 사용
      VAULT_ADDR: 'http://127.0.0.1:${VAULT_PORT:-8200}'
      # 다른 컨테이너가 접근할 수 있는 API 주소
      VAULT_API_ADDR: 'http://vault:${VAULT_PORT:-8200}'
      # raft/cluster 내부 통신용 주소
      VAULT_CLUSTER_ADDR: 'https://vault:${VAULT_CLUSTER_PORT:-8201}'
      SKIP_SETCAP: 'true'
      SKIP_CHOWN: 'true'
    volumes:
      - vault-data:/vault/data
      - ./config/vault.hcl:/vault/config/vault.hcl:ro
    command:
      - vault
      - server
      - -config=/vault/config/vault.hcl
    networks:
      - infra_net
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q -O- "http://127.0.0.1:${VAULT_PORT:-8200}/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200" >/dev/null 2>&1 || exit 1',
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.vault.rule: Host(`vault.${DEFAULT_URL}`)
      traefik.http.routers.vault.entrypoints: websecure
      traefik.http.routers.vault.tls: 'true'
      traefik.http.services.vault.loadbalancer.server.port: ${VAULT_PORT:-8200}

  vault-agent:
    profiles:
      - core
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-med
    image: hashicorp/vault:1.21.4
    container_name: vault-agent
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
      - SETGID # su-exec: setgroups 에러 해결용
      - SETUID # 사용자 ID 전환 권한
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: 'http://vault:${VAULT_PORT:-8200}'
      SKIP_SETCAP: 'true'
      SKIP_CHOWN: 'true'
    volumes:
      - ./config/vault-agent.hcl:/vault/config/vault-agent.hcl:ro
      - ./config/templates:/vault/config/templates:ro
      - vault-agent-data:/vault/agent
      - vault-agent-out:/vault/out
    command:
      - vault
      - agent
      - -config=/vault/config/vault-agent.hcl
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pid="$$(cat /tmp/vault-agent.pid 2>/dev/null || true)"; [ -n "$$pid" ] && kill -0 "$$pid" 2>/dev/null || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - infra_net
