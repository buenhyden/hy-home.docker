x-tier-label: &tier-label
  hy-home.tier: workflow

x-n8n-common-env: &n8n-common-env
  GENERIC_TIMEZONE: ${DEFAULT_TIMEZONE:-Asia/Seoul}
  TZ: ${DEFAULT_TIMEZONE:-Asia/Seoul}
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: ${POSTGRES_MNG_HOSTNAME}
  DB_POSTGRESDB_PORT: ${POSTGRES_PORT:-5432}
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: ${N8N_DB_USER}
  DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/n8n_db_password
  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: n8n-valkey
  QUEUE_BULL_REDIS_PORT: ${VALKEY_PORT:-6379}
  QUEUE_BULL_PREFIX: n8n
  QUEUE_BULL_REDIS_PASSWORD_FILE: /run/secrets/n8n_valkey_password
  N8N_RUNNERS_ENABLED: true
  N8N_RUNNERS_MODE: external
  N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
  N8N_NATIVE_PYTHON_RUNNER: true
  N8N_RUNNERS_AUTH_TOKEN_FILE: /run/secrets/n8n_runner_auth_token
  N8N_RUNNER_TASK_TIMEOUT: 300
  N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_encryption_key
  N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: true

volumes:
  n8n-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_WORKFLOW_DIR}/n8n
  n8n-valkey-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_WORKFLOW_DIR}/valkey
  n8n-task-runner-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_WORKFLOW_DIR}/n8n-task-runner

secrets:
  n8n_valkey_password:
    external: true
  n8n_db_password:
    external: true
  n8n_encryption_key:
    external: true
  n8n_runner_auth_token:
    external: true

networks:
  infra_net:
    external: true

services:
  n8n:
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-high
    build:
      context: .
      dockerfile: Dockerfile
      args:
        N8N_VERSION: 2.12.3
    image: hyhome/n8n:2.12.3-local
    container_name: n8n
    read_only: false
    expose:
      - ${N8N_PORT:-5678}
    secrets:
      - n8n_valkey_password
      - n8n_db_password
      - n8n_encryption_key
      - n8n_runner_auth_token
    volumes:
      - n8n-data:/home/node/.n8n:rw
      - ./custom:/home/node/.n8n/custom:rw
    environment:
      <<: *n8n-common-env
      N8N_PROXY_HOPS: 1
      N8N_PROTOCOL: https
      N8N_HOST: n8n.${DEFAULT_URL}
      N8N_PORT: ${N8N_PORT:-5678}
      WEBHOOK_URL: https://n8n.${DEFAULT_URL}
      N8N_PUSH_BACKEND: websocket
      N8N_PUBLIC_API_DISABLED: false
      N8N_API_KEY_GENERATED_ENABLED: true
      N8N_EDITOR_BASE_URL: https://n8n.${DEFAULT_URL}
      N8N_PUBLIC_API_BASE_URL: https://n8n.${DEFAULT_URL}
      N8N_METRICS: true
      N8N_METRICS_PREFIX: n8n_
      N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL: true
      N8N_METRICS_INCLUDE_NODE_TYPE_LABEL: true
      N8N_METRICS_INCLUDE_QUEUE_METRICS: true
      QUEUE_HEALTH_CHECK_ACTIVE: true
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.n8n.rule: Host(`n8n.${DEFAULT_URL}`)
      traefik.http.routers.n8n.entrypoints: websecure
      traefik.http.routers.n8n.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
      traefik.http.routers.n8n.tls: 'true'
      traefik.http.routers.n8n.service: n8n
      traefik.http.services.n8n.loadbalancer.server.port: ${N8N_PORT:-5678}
    networks:
      - infra_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:${N8N_PORT:-5678}/healthz || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  n8n-worker:
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-high
    build:
      context: .
      dockerfile: Dockerfile
      args:
        N8N_VERSION: 2.12.3
    image: hyhome/n8n:2.12.3-local
    container_name: n8n-worker
    read_only: false
    depends_on:
      n8n: { condition: service_healthy }
      n8n-valkey: { condition: service_healthy }
    volumes:
      - n8n-data:/home/node/.n8n:rw
      - ./custom:/home/node/.n8n/custom:rw
    environment:
      <<: *n8n-common-env
    secrets:
      - n8n_valkey_password
      - n8n_db_password
      - n8n_encryption_key
      - n8n_runner_auth_token
    networks:
      - infra_net
    command: worker
    healthcheck:
      test: ['CMD-SHELL', 'ps -ef | grep -q "[n]8n worker"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      <<: *tier-label

  n8n-task-runner:
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-low
    image: n8nio/runners:2.12.3
    container_name: n8n-task-runner
    read_only: false
    depends_on:
      n8n: { condition: service_healthy }
      n8n-valkey: { condition: service_healthy }
    volumes:
      - n8n-task-runner-data:/home/node/.n8n:rw
    networks:
      - infra_net
    secrets:
      - n8n_runner_auth_token
    healthcheck:
      test: ['CMD-SHELL', 'ps -ef | grep -q "[n]ode" && test -s /run/secrets/n8n_runner_auth_token']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      <<: *tier-label

  n8n-valkey:
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-low
    image: valkey/valkey:9.0.2-alpine
    container_name: n8n-valkey
    read_only: false
    secrets:
      - n8n_valkey_password
    networks:
      - infra_net
    restart: unless-stopped
    volumes:
      - n8n-valkey-data:/data:rw
    command: >
      sh -c '
      valkey-server
      --requirepass "$$(cat /run/secrets/n8n_valkey_password)"
      --appendonly yes
      --port 6379
      '
    expose:
      - '${VALKEY_PORT:-6379}'
      - '${VALKEY_BUS_PORT:-16379}'
    healthcheck:
      test: ['CMD-SHELL', 'valkey-cli -a $$(cat /run/secrets/n8n_valkey_password) ping | grep PONG']
      interval: 15s
      timeout: 30s
      retries: 5
      start_period: 15s
    labels:
      <<: *tier-label

  n8n-valkey-exporter:
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-low
    image: oliver006/redis_exporter:v1.80.1-alpine
    container_name: n8n-valkey-exporter
    read_only: true
    tmpfs:
      - /tmp
    expose:
      - '${VALKEY_EXPORTER_PORT:-9121}'
    networks:
      - infra_net
    restart: unless-stopped
    secrets:
      - n8n_valkey_password
    entrypoint: [/bin/sh, -c]
    command:
      - |
        exec /redis_exporter           -redis.addr=redis://n8n-valkey:6379           -redis.password-file=/run/secrets/n8n_valkey_password           -web.listen-address=:${VALKEY_EXPORTER_PORT:-9121}
    depends_on:
      n8n-valkey: { condition: service_healthy }
    labels:
      <<: *tier-label
