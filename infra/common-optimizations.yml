name: hy-home-common

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-labels-managed: &labels-managed
  hy-home.managed: "true"

x-security-base: &security-base
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

x-restart-default: &restart-default
  restart: unless-stopped

x-service-defaults: &service-defaults
  <<: [*security-base, *restart-default]
  logging: *default-logging
  labels:
    <<: *labels-managed

x-service-readonly: &service-readonly
  <<: *service-defaults
  read_only: true
  tmpfs:
    - /tmp
    - /run

x-resource-low: &resource-low
  cpus: "0.50"
  mem_limit: 256m

x-resource-med: &resource-med
  cpus: "1.00"
  mem_limit: 512m

x-resource-high: &resource-high
  cpus: "2.00"
  mem_limit: 2g

x-resource-db: &resource-db
  cpus: "2.00"
  mem_limit: 2g

services:
  base-security:
    <<: *security-base

  base-standard:
    <<: *service-defaults

  base-readonly:
    <<: *service-readonly

  template-infra-low:
    <<: [*service-defaults, *resource-low]

  template-infra-med:
    <<: [*service-defaults, *resource-med]

  template-infra-high:
    <<: [*service-defaults, *resource-high]

  template-infra-readonly-low:
    <<: [*service-readonly, *resource-low]

  template-infra-readonly-med:
    <<: [*service-readonly, *resource-med]

  template-infra-readonly-high:
    <<: [*service-readonly, *resource-high]

  template-stateful-low:
    <<: [*service-defaults, *resource-low]
    read_only: false

  template-stateful-med:
    <<: [*service-defaults, *resource-med]
    read_only: false

  template-stateful-high:
    <<: [*service-defaults, *resource-db]
    read_only: false

  template-job-low:
    <<: [*security-base, *resource-low]
    restart: "no"
    logging: *default-logging
    labels:
      <<: *labels-managed
    read_only: true
    tmpfs:
      - /tmp
      - /run

  template-job-med:
    <<: [*security-base, *resource-med]
    restart: "no"
    logging: *default-logging
    labels:
      <<: *labels-managed
    read_only: true
    tmpfs:
      - /tmp
      - /run

  template-host-observer-med:
    <<: [*service-defaults, *resource-med]
