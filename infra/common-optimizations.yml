# Hy-Home Common Infrastructure Optimizations
# Finalized template set based on service-role classification

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "2"

x-logging-loki: &loki-logging
  driver: loki
  options:
    loki-url: "${LOKI_URL:-http://infra-loki:3100/loki/api/v1/push}"
    loki-external-labels:
      'container_name={{.Name}},tier={{ index .ContainerLabels "hy-home.tier" }}'

services:
  base-security:
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  base-security-hardened:
    extends:
      service: base-security
    read_only: true
    tmpfs:
      - /tmp
      - /run

  base-resource-low:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M

  base-resource-med:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M

  base-resource-high:
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          memory: 512M

  base-standard:
    restart: unless-stopped
    logging: *loki-logging
    labels:
      hy-home.managed: "true"
      observability.logs: "true"

  template-infra-low:
    extends:
      service: base-security
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
    restart: unless-stopped
    logging: *loki-logging
    labels:
      hy-home.managed: "true"
      observability.logs: "true"

  template-infra-med:
    extends:
      service: base-security
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
    restart: unless-stopped
    logging: *loki-logging
    labels:
      hy-home.managed: "true"
      observability.logs: "true"

  template-infra-high:
    extends:
      service: base-security
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "1G"
    restart: unless-stopped
    logging: *loki-logging
    labels:
      hy-home.managed: "true"
      observability.logs: "true"

  base-stateful:
    init: true
    restart: unless-stopped
    logging: *loki-logging
    labels:
      hy-home.managed: "true"
      observability.logs: "true"

  template-stateful-low:
    extends:
      service: base-stateful
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  template-stateful-med:
    extends:
      service: base-stateful
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"

  template-stateful-high:
    extends:
      service: base-stateful
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "2G"

  template-job-low:
    init: true
    restart: "no"
    logging: *loki-logging
    labels:
      hy-home.managed: "true"
      observability.logs: "true"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"

  template-job-med:
    init: true
    restart: "no"
    logging: *loki-logging
    labels:
      hy-home.managed: "true"
      observability.logs: "true"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"

  template-host-observer-med:
    init: true
    restart: unless-stopped
    logging: *loki-logging
    labels:
      hy-home.managed: "true"
      observability.logs: "true"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
