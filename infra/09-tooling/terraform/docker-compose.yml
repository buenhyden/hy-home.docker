x-tier-label: &tier-label
  hy-home.tier: tooling


services:
  terraform:
    profiles:
      - 'tooling'
      - iac
    extends:
      file: ../../common-optimizations.yml
      service: template-job-low
    image: hashicorp/terraform:1.14.4
    container_name: terraform
    restart: 'no'
    read_only: false
    tmpfs:
      - /tmp
    volumes:
      - ./workspace:/workspace:rw
      - $HOME/.aws:/root/.aws:ro
      - $HOME/.azure:/root/.azure:ro
    working_dir: /workspace
    entrypoint: ['terraform']
    networks:
      infra_net:
        ipv4_address: 172.19.0.120
    labels:
      <<: *tier-label
