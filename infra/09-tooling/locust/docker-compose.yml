x-tier-label: &tier-label
  hy-home.tier: tooling


volumes:
  locust-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_TOOLING_DIR}/locust

services:
  locust-master:
    profiles:
      - 'tooling'
      - testing
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-med
    build: .
    read_only: false
    labels:
      <<: *tier-label
    ports:
      - '${LOCUST_HOST_PORT:-18089}:${LOCUST_PORT:-8089}'
    environment:
      - LOCUST_INFLUXDB_HOST=influxdb
      - LOCUST_INFLUXDB_PORT=${INFLUXDB_PORT:-8181}
      - LOCUST_INFLUXDB_ORG=${INFLUXDB_ORG}
      - LOCUST_INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    volumes:
      - locust-data:/mnt/locust:rw
    networks:
      infra_net:
        ipv4_address: 172.19.0.250
    secrets:
      - influxdb_api_token
    command: >
      /bin/sh -c "
      export LOCUST_INFLUXDB_TOKEN=$$(cat /run/secrets/influxdb_api_token | tr -d '') &&
      exec locust -f /mnt/locust/locustfile.py --master
      "
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://localhost:8089']
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - '${DEFAULT_URL:-localhost}:host-gateway'

  locust-worker:
    profiles:
      - 'tooling'
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-med
    build: .
    read_only: false
    labels:
      <<: *tier-label
    environment:
      - LOCUST_INFLUXDB_HOST=influxdb
      - LOCUST_INFLUXDB_PORT=${INFLUXDB_PORT:-8181}
      - LOCUST_INFLUXDB_ORG=${INFLUXDB_ORG}
      - LOCUST_INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    volumes:
      - locust-data:/mnt/locust:rw
    networks:
      infra_net:
        ipv4_address: 172.19.0.253
    secrets:
      - influxdb_api_token
    command: >
      /bin/sh -c "
      export LOCUST_INFLUXDB_TOKEN=$$(cat /run/secrets/influxdb_api_token | tr -d '') &&
      exec locust -f /mnt/locust/locustfile.py --worker --master-host locust-master
      "
    depends_on:
      locust-master:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f \"locust.*--worker\" >/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 2
    extra_hosts:
      - '${DEFAULT_URL:-localhost}:host-gateway'
