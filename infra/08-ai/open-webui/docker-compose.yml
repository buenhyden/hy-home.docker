x-tier-label: &tier-label
  hy-home.tier: ai

volumes:
  open-webui:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_AI_MODEL_DIR}/open-webui


services:
  open-webui:
    profiles:
      - 'ai'
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-med
    image: ghcr.io/open-webui/open-webui:v0.8.5-cuda
    container_name: open-webui
    environment:
      - OLLAMA_BASE_URL=http://ollama:${OLLAMA_PORT:-11434}
      - VECTOR_DB_URL=http://qdrant:${QDRANT_PORT:-6333}
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=qwen3-embedding:0.6b
    volumes:
      - open-webui:/app/backend/data:rw
    networks:
      - infra_net
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.open-webui.rule: Host(`chat.${DEFAULT_URL}`)
      traefik.http.routers.open-webui.entrypoints: websecure
      traefik.http.routers.open-webui.tls: 'true'
      traefik.http.services.open-webui.loadbalancer.server.port: ${OLLAMA_WEBUI_PORT:-8080}
      traefik.http.routers.open-webui.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:${OLLAMA_WEBUI_PORT:-8080}/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
