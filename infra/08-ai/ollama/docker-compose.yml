x-tier-label: &tier-label
  hy-home.tier: ai

networks:
  openclaw_default:
    external: true
    name: openclaw_default

volumes:
  ollama-data:
    driver: local
    driver_opts:
      o: bind
      type: none
      device: ${DEFAULT_AI_MODEL_DIR}/ollama


services:
  ollama:
    profiles:
      - 'ai'
      - dev
    extends:
      file: ../../common-optimizations.yml
      service: template-stateful-ai-high
    image: ollama/ollama:0.19.0
    container_name: ollama
    read_only: false
    environment:
      - OLLAMA_HOST=0.0.0.0  # 모든 네트워크 인터페이스에서 수신 허용
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-2}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE:-128}
    volumes:
      - ollama-data:/root/.ollama:rw
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - ${OLLAMA_HOST_PORT}:${OLLAMA_PORT}
      - ${OPENCLAW_GATEWAY_HOST_PORT}:${OPENCLAW_GATEWAY_PORT}
    labels:
      <<: *tier-label
      traefik.enable: 'true'
      traefik.http.routers.ollama.rule: Host(`ollama.${DEFAULT_URL}`)
      traefik.http.routers.ollama.entrypoints: websecure
      traefik.http.routers.ollama.tls: 'true'
      traefik.http.services.ollama.loadbalancer.server.port: ${OLLAMA_PORT:-11434}
      traefik.http.routers.ollama.middlewares: gateway-standard-chain@file,sso-errors@file,sso-auth@file
    networks:
      openclaw_default:
      infra_net:
        ipv4_address: 172.19.0.201
    healthcheck:
      test: ['CMD-SHELL', 'ollama list >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama-exporter:
    profiles:
      - 'ai'
      - dev
    extends:
      file: ../../common-optimizations.yml
      service: template-infra-low
    image: lucabecker42/ollama-exporter:1.0.1
    container_name: ollama-exporter
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - OLLAMA_HOST=ollama:${OLLAMA_PORT:-11434}
    expose:
      - '${OLLAMA_EXPORTER_PORT:-8000}'
    networks:
      infra_net:
        ipv4_address: 172.19.0.211
    labels:
      <<: *tier-label
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q -O- http://localhost:${OLLAMA_EXPORTER_PORT:-8000}/metrics >/dev/null 2>&1 || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
