schema_version: 1
checked_at: "2026-07-15T10:00:00+09:00"
path_pattern_limits:
  max_brace_groups: 64
  max_expanded_paths: 1024
  max_pattern_length: 4096
governed_families:
  - family_id: provider-entry-indexes
    path_pattern: "{.agents/README.md,.claude/CLAUDE.md,.codex/README.md,.gemini/README.md}"
    repository_sections: [harness]
  - family_id: root-instruction-shims
    path_pattern: "{AGENTS,CLAUDE,GEMINI}.md"
    repository_sections: [harness]
  - family_id: stage00-markdown
    path_pattern: docs/00.agent-governance/**/*.md
    repository_sections: [catalog, harness]
artifacts:
  - profile_id: agent-function
    artifact_type: agent-function
    path_pattern: docs/00.agent-governance/agents/functions/*.md
    repository_section: catalog
    canonical: true
    required_keys:
      - layer
      - artifact_type
      - function_id
      - scope
      - status
    key_order:
      - layer
      - artifact_type
      - function_id
      - scope
      - status
    required_sections:
      - Preconditions
      - Inputs
      - Procedure
      - Outputs
      - Gates
      - Failure Handling
      - Related Documents
    expected_values:
      layer: agentic
      artifact_type: agent-function
      function_id: $path_stem
      status: active
  - profile_id: agent-role
    artifact_type: agent-role
    path_pattern: docs/00.agent-governance/agents/agents/*.md
