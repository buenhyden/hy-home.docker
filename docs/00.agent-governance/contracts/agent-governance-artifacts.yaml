root_shims:
  - path: AGENTS.md
    provider: shared
    bootstrap_target: docs/00.agent-governance/rules/bootstrap.md
    provider_target: docs/00.agent-governance/providers/agents-md.md
    memory_targets:
      - docs/00.agent-governance/memory/README.md
      - docs/00.agent-governance/memory/progress.md
    import_style: numbered-load
    frontmatter: forbidden
  - path: CLAUDE.md
    provider: claude
    bootstrap_target: docs/00.agent-governance/rules/bootstrap.md
    provider_target: docs/00.agent-governance/providers/claude.md
    memory_targets:
      - docs/00.agent-governance/memory/README.md
      - docs/00.agent-governance/memory/progress.md
    import_style: at-import
    frontmatter: forbidden
  - path: GEMINI.md
    provider: gemini
    bootstrap_target: docs/00.agent-governance/rules/bootstrap.md
    provider_target: docs/00.agent-governance/providers/gemini.md
    memory_targets:
      - docs/00.agent-governance/memory/README.md
      - docs/00.agent-governance/memory/progress.md
    import_style: at-dot-import
    frontmatter: forbidden
readme_profiles:
