schema_version: 1

manifest:
  dispositions:
    - migrate
    - preserve
    - move
    - merge
    - archive
    - delete
    - regenerate
    - exempt

archive:
  dispositions:
    - superseded
    - duplicate
    - conflict
    - withdrawn
    - evidence-preserve
  preservation_classes:
    - git-history
    - immutable-snapshot

directory_budgets:
  warning_at: 100
  block_new_leaf_at: 150

review_signals:
  draft_days: 30
  active_days: 90
  completed_execution_days: 180

manifest_schema:
  top_level_fields:
    - schema_version
    - wave
    - baseline_commit
    - generated_by
    - enforcement
    - entries
  entry_fields:
    - source_path
    - target_path
    - artifact_id
    - artifact_type
    - status_before
    - status_after
    - parent_ids
    - disposition
    - canonical_replacement
    - active_consumers
    - partition_plan
    - preservation_class
    - evidence
    - review_verdict
  evidence_fields:
    - commands
    - sources
    - repository_paths
    - consumer_scan
    - rollback
  review_verdict_fields:
    - specification
    - quality
  review_verdict_values:
    - pending
    - pass
    - changes-required
  field_contracts:
    schema_version: {type: integer, nullable: false, domain: constant-1}
    wave: {type: string, nullable: false, domain: non-empty-string}
    baseline_commit: {type: string, nullable: false, domain: lowercase-full-object-id}
    generated_by: {type: string, nullable: false, domain: non-empty-string}
    enforcement: {type: string, nullable: false, domain: advisory-or-blocking}
    entries: {type: list, nullable: false, domain: migration-entry}
    source_path: {type: string, nullable: false, domain: safe-baseline-tracked-path}
    target_path: {type: string, nullable: true, domain: safe-repository-path, null_condition: disposition-delete}
    artifact_id: {type: string, nullable: true, domain: stable-artifact-id, null_condition: disposition-exempt}
    artifact_type: {type: string, nullable: false, domain: registered-artifact-type}
    status_before: {type: string, nullable: true, domain: registered-lifecycle-status, null_condition: disposition-exempt}
    status_after: {type: string, nullable: true, domain: registered-lifecycle-status, null_condition: disposition-exempt}
    parent_ids: {type: list, nullable: false, domain: deterministic-string-list}
    disposition: {type: string, nullable: false, domain: registered-manifest-disposition}
    canonical_replacement: {type: string, nullable: true, domain: non-empty-string, null_condition: replacement-requirements}
    active_consumers: {type: list, nullable: false, domain: deterministic-safe-path-list}
    partition_plan: {type: string, nullable: true, domain: safe-approved-plan-path}
    preservation_class: {type: string, nullable: true, domain: registered-preservation-class, null_condition: non-destructive-row}
    evidence: {type: mapping, nullable: false, domain: exact-evidence-mapping}
    review_verdict: {type: mapping, nullable: false, domain: exact-review-verdict-mapping}
    evidence.commands: {type: list, nullable: false, domain: deterministic-string-list}
    evidence.sources: {type: list, nullable: false, domain: deterministic-string-list}
    evidence.repository_paths: {type: list, nullable: false, domain: deterministic-string-list}
    evidence.consumer_scan: {type: list, nullable: false, domain: deterministic-string-list}
    evidence.rollback: {type: list, nullable: false, domain: deterministic-string-list}
    review_verdict.specification: {type: string, nullable: false, domain: review-verdict-values}
    review_verdict.quality: {type: string, nullable: false, domain: review-verdict-values}
  deterministic_order:
    entries: source_path
    parent_ids: lexicographic
    active_consumers: lexicographic
    evidence.commands: lexicographic
    evidence.sources: lexicographic
    evidence.repository_paths: lexicographic
    evidence.consumer_scan: lexicographic
    evidence.rollback: lexicographic
  destructive_execution:
    dispositions:
      - merge
      - archive
      - delete
    active_consumers_required: true
    empty_consumers_require: evidence.consumer_scan
    non_empty_evidence:
      - commands
      - sources
      - repository_paths
      - consumer_scan
      - rollback
    preservation_class_required: true
    replacement_semantics: replacement_requirements
    required_review:
      specification: pass
      quality: pass

exception_schema:
  top_level_fields:
    - schema_version
    - exceptions
  entry_fields:
    - finding_code
    - scope_paths
    - owner
    - reason
    - approved_at
    - expires_on
    - exit_condition
    - evidence
  field_contracts:
    schema_version: {type: integer, nullable: false, domain: constant-1}
    exceptions: {type: list, nullable: false, domain: bounded-exception}
    finding_code: {type: string, nullable: false, domain: validator-known-finding-code}
    scope_paths: {type: list, nullable: false, domain: deterministic-bounded-safe-path-list}
    owner: {type: string, nullable: false, domain: non-empty-string}
    reason: {type: string, nullable: false, domain: non-empty-string}
    approved_at: {type: string, nullable: false, domain: strict-iso-date-not-future}
    expires_on: {type: string, nullable: false, domain: strict-iso-date-after-validation-date}
    exit_condition: {type: string, nullable: false, domain: non-empty-string}
    evidence: {type: list, nullable: false, domain: deterministic-non-empty-safe-path-list}
  deterministic_order:
    exceptions: finding_code-and-scope-paths
    scope_paths: lexicographic
    evidence: lexicographic
  bounded_semantics:
    finding_code_source: validator-known-finding-codes
    require_non_empty_scope_paths: true
    forbid_wildcards: true
    forbid_global_scopes:
      - '*'
      - '**'
      - '.'
      - all
      - global
    require_non_empty_text:
      - owner
      - reason
      - exit_condition
    approval: approved_at-not-future
    expiry: expires_on-after-validation-date
    require_non_empty_safe_evidence_paths: true

disposition_conditions:
  migrate: source-equals-target
  preserve: source-equals-target
  move: target-distinct
  merge: target-distinct
  archive: target-distinct
  delete: target-null
  regenerate: source-equals-target
  exempt: source-equals-target

replacement_requirements:
  required_for:
    - merge
    - archive
  optional_for:
    - delete
  forbidden_for:
    - migrate
    - preserve
    - move
    - regenerate
    - exempt

snapshot_admission:
  allowed_archive_dispositions:
    - evidence-preserve
  required_preservation_class: immutable-snapshot
  required_fields:
    - snapshot_path
    - content_sha256
    - snapshot_reason
  required_checks:
    - confidentiality-scan
    - content-sha256
  path_prefix: docs/98.archive/evidence/
  path_suffix: .md.snapshot
  forbidden_payload_classes:
    - secret
    - credential
    - token
    - private-key
    - auth-file
    - shell-history
    - raw-log

safe_diagnostics:
  allowed:
    - finding-code
    - bounded-path
    - safe-metadata
    - count
    - git-object-id
  forbidden:
    - body-payload
    - snapshot-bytes
    - secret-value
    - credential
    - token
    - private-key
    - auth-file
    - shell-history
    - raw-log
    - diagnostic-payload

