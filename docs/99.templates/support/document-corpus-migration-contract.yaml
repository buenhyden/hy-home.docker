      - scripts/validation/check-document-corpus-lifecycle.py
      - tests/validation/test_document_corpus_lifecycle.py
  wave-a-active-sdlc:
    enforcement: advisory
    manifest_path: null
    scope_state: unapproved
    source_paths: []
    declared_outputs: []
  wave-b-operations:
    enforcement: advisory
    manifest_path: null
    scope_state: unapproved
    source_paths: []
    declared_outputs: []
  wave-c-historical-evidence:
    enforcement: advisory
    manifest_path: null
    scope_state: unapproved
    source_paths: []
    declared_outputs: []
  wave-d-archive-provenance:
    enforcement: advisory
    manifest_path: null
    scope_state: unapproved
    source_paths: []
    declared_outputs: []
  wave-e-references-final-gates:
    enforcement: advisory
    manifest_path: null
    scope_state: unapproved
    source_paths: []
    declared_outputs: []

planned_partitions:
  docs/04.execution/plans: docs/04.execution/plans/YYYY
  docs/04.execution/tasks: docs/04.execution/tasks/YYYY
