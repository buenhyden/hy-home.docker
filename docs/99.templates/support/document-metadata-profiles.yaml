profiles:
  prd:
    required: [status, artifact_id, artifact_type, parent_ids]
    optional: [supersedes]
    forbidden: [type, document_type, template_type, owner, updated, links, reviewed_at, review_cycle, generated_by, layer, archived_from, archived_on, archive_reason, current_replacement]
    allowed_statuses: [draft, active, completed, superseded]
    allowed_parent_types: []
    allow_empty_parents: true
    disposition: migration candidate

  ard:
    required: [status, artifact_id, artifact_type, parent_ids]
    optional: [supersedes]
    forbidden: [type, document_type, template_type, owner, updated, links, reviewed_at, review_cycle, generated_by, layer, archived_from, archived_on, archive_reason, current_replacement]
    allowed_statuses: [draft, active, completed, superseded]
    allowed_parent_types: [prd]
    allow_empty_parents: false
    disposition: migration candidate

  adr:
    required: [status, artifact_id, artifact_type, parent_ids]
    optional: [supersedes]
    forbidden: [type, document_type, template_type, owner, updated, links, reviewed_at, review_cycle, generated_by, layer, archived_from, archived_on, archive_reason, current_replacement]
    allowed_statuses: [draft, active, completed, superseded]
    allowed_parent_types: [prd, ard]
    allow_empty_parents: false
    disposition: migration candidate

  spec:
    required: [status, artifact_id, artifact_type, parent_ids]
    optional: [supersedes, reviewed_at, review_cycle]
    forbidden: [type, document_type, template_type, owner, updated, links, generated_by, layer, archived_from, archived_on, archive_reason, current_replacement]
    allowed_statuses: [draft, active, completed, superseded]
    allowed_parent_types: [prd, ard, adr, spec]
    allow_empty_parents: false
    disposition: migration candidate

  plan:
    required: [status, artifact_id, artifact_type, parent_ids]
    optional: [supersedes]
    forbidden: [type, document_type, template_type, owner, updated, links, reviewed_at, review_cycle, generated_by, layer, archived_from, archived_on, archive_reason, current_replacement]
    allowed_statuses: [draft, active, completed, superseded]
    allowed_parent_types: [prd, ard, adr, spec]
    allow_empty_parents: false
    disposition: migration candidate

  task:
    required: [status, artifact_id, artifact_type, parent_ids]
    optional: [supersedes]
    forbidden: [type, document_type, template_type, owner, updated, links, reviewed_at, review_cycle, generated_by, layer, archived_from, archived_on, archive_reason, current_replacement]
    allowed_statuses: [draft, active, completed, superseded]
    allowed_parent_types: [spec, plan, task]
    allow_empty_parents: false
    disposition: migration candidate

