schema_version: 2

common:
  allowed_statuses: [draft, active, completed, superseded, archived]
  terminal_statuses: [superseded, archived]
  transitions:
    draft: [active]
    active: [completed, superseded]
    completed: [superseded]
    superseded: []
    archived: []
  globally_forbidden: [type, document_type, template_type, owner, updated, links]
  typed_keys: [status, artifact_id, artifact_type, parent_ids, supersedes, reviewed_at, review_cycle]
  frontmatter_order:
    - status
    - artifact_id
    - artifact_type
    - parent_ids
    - supersedes
    - reviewed_at
    - review_cycle
    - generated_by
    - archived_from
    - archived_on
    - archive_reason
    - archive_disposition
    - archived_commit
    - archived_blob
    - preservation_class
    - current_replacement
    - snapshot_path
    - content_sha256
    - snapshot_reason
  inventory_excludes:
    - docs/90.references/audits/2026-07-05-agentic-engineering-implementation-audit-pack/frontmatter-semantic-inventory.md
  generated_outputs:
    docs/90.references/data/governance/document-corpus-lifecycle/foundation-summary.md: scripts/validation/check-document-corpus-lifecycle.py
  template_placeholders:
    artifact_id: <artifact-id>
    parent_id: <parent-artifact-id>
    reviewed_at: <reviewed-at>
    review_cycle: <review-cycle>
    archived_from: docs/<original-path>.md
    archived_on: YYYY-MM-DD
    archive_reason: <archive-reason>
    archive_disposition: <archive-disposition>
    archived_commit: <archived-commit>
    archived_blob: <archived-blob>
    preservation_class: <preservation-class>
    current_replacement: docs/<replacement-path>.md
    snapshot_path: docs/98.archive/evidence/<content-sha256>.md.snapshot
    content_sha256: <content-sha256>
    snapshot_reason: <snapshot-reason>
  root_exceptions:
    docs/03.specs/123-agentic-engineering-audit-remediation/spec.md: Cross-cutting umbrella spec approved without a manufactured PRD, ARD, or ADR parent.

document_families:
  sdlc: [prd, ard, adr, spec, plan, task, guide, policy, runbook, incident, postmortem, release]
  common: [reference, audit, archive, readme, governance, generated, template-source, repo-support, unsupported]

readme_profiles:
  repository-root:
    path_globs: [README.md]
    frontmatter: forbidden
    frontmatter_consumer: null
    allowed_frontmatter_keys: []
    required_headings: [Overview, Audience, Scope, Structure, How to Work in This Area, Related Documents]
    optional_headings: [Getting Started, Documentation Standards, Verification and Quality Gates]
    forbidden_headings: [Canonical Shared Rules]
    allowed_local_content_role: Repository entrypoint, navigation, and workspace-specific onboarding.
    canonical_shared_rule_owner: docs/00.agent-governance/rules/documentation-protocol.md

  stage-index:
    path_globs:
      - docs/README.md
      - docs/01.requirements/README.md
      - docs/02.architecture/README.md
      - docs/02.architecture/*/README.md
      - docs/03.specs/README.md
      - docs/03.specs/*/README.md
      - docs/04.execution/README.md
      - docs/04.execution/*/README.md
      - docs/05.operations/README.md
      - docs/05.operations/*/README.md
      - docs/05.operations/*/*/README.md
      - docs/05.operations/*/*/*/README.md
      - docs/90.references/README.md
      - docs/90.references/*/README.md
      - docs/90.references/*/*/README.md
      - docs/90.references/data/governance/document-corpus-lifecycle/README.md
    frontmatter: optional
    frontmatter_consumer: scripts/validation/check-document-metadata.py
    allowed_frontmatter_keys: [status]
    required_headings: [Overview, Audience, Scope, Structure, How to Work in This Area, Related Documents]
    optional_headings: [Status, Current Inventory, Documentation Standards, AI Agent Guidance]
    forbidden_headings: [Canonical Shared Rules]
    allowed_local_content_role: Stage or document-set navigation, local inventory, and profile-specific workflow context.
    canonical_shared_rule_owner: docs/00.agent-governance/rules/stage-authoring-matrix.md

  governance-catalog:
    path_globs:
      - docs/00.agent-governance/README.md
      - docs/00.agent-governance/*/README.md
    frontmatter: optional
    frontmatter_consumer: scripts/validation/check-document-metadata.py
    allowed_frontmatter_keys: [layer]
    required_headings: [Overview, Audience, Scope, Structure, How to Work in This Area, Related Documents]
    optional_headings: [Purpose, Operational Procedures, Maintenance and Safety]
    forbidden_headings: [Canonical Shared Rules]
    allowed_local_content_role: Governance catalog navigation and local ownership boundaries.
    canonical_shared_rule_owner: docs/00.agent-governance/README.md

  provider-runtime:
    path_globs: [.agents/README.md, .codex/README.md]
    frontmatter: optional
    frontmatter_consumer: scripts/validation/check-repo-contracts.sh
    allowed_frontmatter_keys: [layer, runtime]
    required_headings: [Scope, How to Work in This Area, Related Documents]
    optional_headings: [Authority, Provider Behavior, Harness Alignment Gates]
    forbidden_headings: [Canonical Shared Rules]
    allowed_local_content_role: Provider runtime entrypoint, compatibility notes, and provider-specific navigation.
    canonical_shared_rule_owner: docs/00.agent-governance/providers/codex.md

  infrastructure-root:
    path_globs: [infra/README.md]
    frontmatter: forbidden
    frontmatter_consumer: null
    allowed_frontmatter_keys: []
    required_headings: [Overview, Audience, Scope, Structure, How to Work in This Area, Related Documents]
    optional_headings: [Infrastructure Tiers (01-11), Compose Inventory Snapshot, Execution Model]
    forbidden_headings: [Canonical Shared Rules]
    allowed_local_content_role: Infrastructure catalog, compose entrypoint, and tier navigation.
    canonical_shared_rule_owner: docs/00.agent-governance/rules/documentation-protocol.md

  infrastructure-tier:
    path_globs: [infra/*/README.md]
    frontmatter: forbidden
    frontmatter_consumer: null
    allowed_frontmatter_keys: []
    required_headings: [Overview, Audience, Scope, Structure, How to Work in This Area, Related Documents]
    optional_headings: [Tech Stack, Service Matrix, Configuration, Validation]
    forbidden_headings: [Canonical Shared Rules]
    allowed_local_content_role: Tier inventory, integration boundaries, and tier-specific operating context.
    canonical_shared_rule_owner: docs/00.agent-governance/rules/documentation-protocol.md

  infrastructure-service:
    path_globs: [infra/*/*/README.md, infra/*/*/*/README.md]
    frontmatter: optional
    frontmatter_consumer: scripts/validation/check-repo-contracts.sh
    allowed_frontmatter_keys: [layer]
    required_headings: [Overview, Audience, Scope, Structure, How to Work in This Area, Related Documents]
    optional_headings: [Service Readiness, Tech Stack, Configuration, Validation, Troubleshooting]
    forbidden_headings: [Canonical Shared Rules]
    allowed_local_content_role: Service-local configuration, validation, troubleshooting, and implementation context.
