schema_version: 1

common:
  allowed_statuses: [draft, active, completed, superseded, archived]
  terminal_statuses: [superseded, archived]
  transitions:
    draft: [active]
    active: [completed, superseded]
    completed: [superseded]
    superseded: []
    archived: []
  globally_forbidden: [type, document_type, template_type, owner, updated, links]
  typed_keys: [status, artifact_id, artifact_type, parent_ids, supersedes, reviewed_at, review_cycle]
  frontmatter_order:
    - status
    - artifact_id
    - artifact_type
    - parent_ids
    - supersedes
    - reviewed_at
    - review_cycle
    - generated_by
    - archived_from
    - archived_on
    - archive_reason
    - current_replacement
  inventory_excludes:
    - docs/90.references/audits/2026-07-05-agentic-engineering-implementation-audit-pack/frontmatter-semantic-inventory.md
  template_placeholders:
    artifact_id: <artifact-id>
    parent_id: <parent-artifact-id>
    reviewed_at: <reviewed-at>
    review_cycle: <review-cycle>
    archived_from: docs/<original-path>.md
    archived_on: YYYY-MM-DD
    archive_reason: <archive-reason>
    current_replacement: docs/<replacement-path>.md
  root_exceptions:
    docs/03.specs/123-agentic-engineering-audit-remediation/spec.md: Cross-cutting umbrella spec approved without a manufactured PRD, ARD, or ADR parent.

document_families:
  sdlc: [prd, ard, adr, spec, plan, task, guide, policy, runbook, incident, postmortem, release]
  common: [reference, audit, archive, readme, governance, generated, template-source, repo-support, unsupported]

readme_profiles:
  repository-root:
    path_globs: [README.md]
    frontmatter: forbidden
    frontmatter_consumer: null
    allowed_frontmatter_keys: []
    required_headings: [Overview, Audience, Scope, Structure, How to Work in This Area, Related Documents]
    optional_headings: [Getting Started, Documentation Standards, Verification and Quality Gates]
    forbidden_headings: [Canonical Shared Rules]
    allowed_local_content_role: Repository entrypoint, navigation, and workspace-specific onboarding.
    canonical_shared_rule_owner: docs/00.agent-governance/rules/documentation-protocol.md

  stage-index:
    path_globs:
      - docs/README.md
      - docs/01.requirements/README.md
      - docs/02.architecture/README.md
      - docs/02.architecture/*/README.md
      - docs/03.specs/README.md
      - docs/03.specs/*/README.md
      - docs/04.execution/README.md
      - docs/04.execution/*/README.md
      - docs/05.operations/README.md
      - docs/05.operations/*/README.md
      - docs/05.operations/*/*/README.md
      - docs/05.operations/*/*/*/README.md
      - docs/90.references/README.md
      - docs/90.references/*/README.md
      - docs/90.references/*/*/README.md
    frontmatter: optional
    frontmatter_consumer: scripts/validation/check-document-metadata.py
    allowed_frontmatter_keys: [status]
    required_headings: [Overview, Audience, Scope, Structure, How to Work in This Area, Related Documents]
    optional_headings: [Status, Current Inventory, Documentation Standards, AI Agent Guidance]
    forbidden_headings: [Canonical Shared Rules]
    allowed_local_content_role: Stage or document-set navigation, local inventory, and profile-specific workflow context.
    canonical_shared_rule_owner: docs/00.agent-governance/rules/stage-authoring-matrix.md

  governance-catalog:
