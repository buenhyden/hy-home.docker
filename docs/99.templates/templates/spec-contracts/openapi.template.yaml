# Target: docs/03.specs/NNN-<feature-id>/contracts/openapi.yaml
# Cross-links: link this contract from the parent Markdown spec or API spec.
# Do not add a Markdown Related Documents section to this YAML contract.
openapi: 3.1.0
info:
  title: __API_TITLE__
  version: __API_VERSION__
  description: __API_DESCRIPTION__
servers:
  - url: __SERVER_URL__
tags:
  - name: __TAG_NAME__
paths:
  /__RESOURCE_PATH__:
    __HTTP_METHOD__:
      tags: [__TAG_NAME__]
      operationId: __OPERATION_ID__
      summary: __OPERATION_SUMMARY__
      responses:
        "__SUCCESS_STATUS__":
          description: __SUCCESS_DESCRIPTION__
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/__RESPONSE_SCHEMA__"
        "__ERROR_STATUS__":
          description: __ERROR_DESCRIPTION__
components:
  schemas:
    __RESPONSE_SCHEMA__:
      type: object
      required: [__IDENTIFIER_FIELD__, __STATUS_FIELD__]
      properties:
        __IDENTIFIER_FIELD__:
          type: string
        __STATUS_FIELD__:
          type: string
  securitySchemes:
    __SECURITY_SCHEME__:
      type: http
      scheme: bearer
      bearerFormat: __BEARER_FORMAT__
security:
  - __SECURITY_SCHEME__: []
