    file: ./secrets/storage/minio_root_username.txt
  minio_app_user_password:
    file: ./secrets/storage/minio_app_user_password.txt
  minio_app_username:
    file: ./secrets/storage/minio_app_username.txt

  # ── OpenSearch ──────────────────────────────────────────
