  supabase_logflare_private_token:
    file: ./secrets/data/supabase_logflare_private_token.txt
  supabase_db_enc_key:
    file: ./secrets/data/supabase_db_enc_key.txt

  # ── InfluxDB ─────────────────────────────────────────────
  influxdb_password:
    file: ./secrets/db/influxdb/influxdb_password.txt
  influxdb_api_token:
    file: ./secrets/db/influxdb/influxdb_api_token.txt

  # ── CouchDB ──────────────────────────────────────────────
  couchdb_password:
    file: ./secrets/db/couchdb/couchdb_password.txt
  couchdb_cookie:
    file: ./secrets/db/couchdb/couchdb_cookie.txt

