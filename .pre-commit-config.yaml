repos:
  # --- 1. Basic Format & File System ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=10000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: end-of-file-fixer
      - id: check-json
      - id: mixed-line-ending
      - id: trailing-whitespace

  # --- 2. Linting (YAML, Markdown, Shell) ---
  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        require_serial: true

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # --- 3. Actions & CI Configuration ---
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-dependabot

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.23.1
    hooks:
      - id: zizmor

  # --- 4. Infrastructure & Docker ---
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker

  # --- 5. Security ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]

  # --- 6. Local Project Specific ---
  - repo: local
    hooks:
      - id: eslint-nextjs
        name: eslint (nextjs)
        entry: npm run lint --prefix projects/storybook/nextjs
        language: system
        types: [javascript, jsx, ts, tsx]
        files: ^projects/storybook/nextjs/
        pass_filenames: false

      - id: docker-compose-check
        name: Validate Docker Compose
        entry: ./scripts/validate-docker-compose.sh
        language: script
        files: (docker-compose\.yml|\.env\.example|infra/.*)
        pass_filenames: false
        stages: [pre-push]
  # --- 7. 커밋 및 메시지 (Release) ---
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]
        args: [--allow-abort, --message-length-limit=75]
